<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeStore</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VibeStore">

    <style>
        :root {
            --bg-body: #f3f4f9;
            --bg-card: #ffffff;
            --bg-nav: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --purple-accent: #8b5cf6;
            --purple-light: #ede9fe;
            --green: #34c759;
            --blue-apple: #007aff;
            --red: #ff3b30;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        @media (prefers-color-scheme: dark) {
            body:not([data-theme="light"]) {
                --bg-body: #0f0f12; --bg-card: #18181c; --bg-nav: #18181c;
                --text-main: #f8fafc; --text-muted: #94a3b8; --purple-accent: #a78bfa;
                --purple-light: #2e1065; --border-color: #27272a;
                --shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            }
        }

        [data-theme="dark"] {
            --bg-body: #0f0f12; --bg-card: #18181c; --bg-nav: #18181c;
            --text-main: #f8fafc; --text-muted: #94a3b8; --purple-accent: #a78bfa;
            --purple-light: #2e1065; --border-color: #27272a;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }
        
        [data-theme="light"] {
            --bg-body: #f3f4f9; --bg-card: #ffffff; --bg-nav: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b; --purple-accent: #8b5cf6;
            --purple-light: #ede9fe; --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--textMain); 
            transition: background-color 0.3s, color 0.3s; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden;
            overscroll-behavior: none; 
        }

        /* HEADER */
        header { background-color: var(--bg-nav); padding: calc(var(--safe-top) + 1rem) 1.5rem 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
        .header-actions { display: flex; align-items: center; gap: 1rem; }
        .icon-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: transform 0.15s; touch-action: manipulation; }
        .icon-btn:active { transform: scale(0.92); }
        .cart-btn { background: var(--purple-light); color: var(--purple-accent); position: relative; }
        .badge { position: absolute; top: -3px; right: -3px; background-color: var(--red); color: #fff; font-size: 0.65rem; font-weight: 800; min-width: 18px; height: 18px; padding: 0 4px; border-radius: 9px; border: 2px solid var(--bg-nav); display: flex; align-items: center; justify-content: center; }
        .badge.pop { animation: pop 0.3s cubic-bezier(0.36,0.07,0.19,0.97); }
        @keyframes pop { 0%,100%{transform:scale(1)} 40%{transform:scale(1.45)} 70%{transform:scale(0.9)} }

        /* NAV */
        .nav-scroller { overflow-x: auto; white-space: nowrap; padding: 0.85rem 1.5rem; background: var(--bg-nav); border-bottom: 1px solid var(--border-color); -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .nav-scroller::-webkit-scrollbar { display: none; }
        .btn-cat { display: inline-flex; align-items: center; gap: 0.3rem; background: transparent; border: none; color: var(--text-muted); padding: 0.55rem 1.1rem; border-radius: 20px; font-size: 0.9rem; font-weight: 600; margin-right: 0.4rem; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .btn-cat.active { background: var(--purple-accent); color: #fff; box-shadow: 0 4px 12px rgba(139,92,246,0.3); }

        /* MAIN */
        .main-content { flex: 1; padding: 1.2rem 1.2rem 0; max-width: 600px; margin: 0 auto; width: 100%; }
        .search-wrap { position: relative; margin-bottom: 1.1rem; }
        .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        .search-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); padding: 0.85rem 2.8rem 0.85rem 2.5rem; border-radius: 18px; color: var(--text-main); outline: none; font-size: 0.95rem; transition: border-color 0.25s, box-shadow 0.25s; -webkit-appearance: none; }
        .search-input:focus { border-color: var(--purple-accent); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
        .search-clear { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; display: none; padding: 4px; }
        .search-clear.visible { display: block; }

        /* GRID */
        .grid-productos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; padding-bottom: 120px; }
        .card { background: var(--bg-card); border-radius: 22px; padding: 0.75rem; border: 1px solid var(--border-color); box-shadow: var(--shadow); display: flex; flex-direction: column; position: relative; overflow: hidden; transition: transform 0.2s; }
        .card:active { transform: translateY(-2px); }
        .img-container { width: 100%; aspect-ratio: 1/1; border-radius: 16px; background: var(--purple-light); margin-bottom: 0.75rem; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .card-tag { position: absolute; top: 1.1rem; left: 1.1rem; background: rgba(255,255,255,0.92); backdrop-filter: blur(4px); color: #000; font-size: 0.6rem; font-weight: 700; padding: 3px 8px; border-radius: 8px; text-transform: uppercase; z-index: 2; }
        .card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-desc { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.75rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 30px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-weight: 800; font-size: 1.05rem; }
        .btn-add { background: var(--text-main); color: var(--bg-card); border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: 700; font-size: 1.15rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background-color 0.2s; flex-shrink: 0; touch-action: manipulation; }
        .btn-add:active { transform: scale(0.88); }
        .btn-add.added { background: var(--green); animation: addPop 0.35s ease; }
        @keyframes addPop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

        /* EMPTY STATE CORRECTED */
        .empty-state { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 3rem 1rem; color: var(--text-muted); text-align: center; }
        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        /* CART DRAWER */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .drawer-overlay.open { opacity: 1; pointer-events: all; }
        .cart-drawer { position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; background: var(--bg-card); border-radius: 28px 28px 0 0; z-index: 201; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); padding: 0 1.5rem calc(1.5rem + var(--safe-bottom)); max-height: 80vh; overflow-y: auto; }
        .cart-drawer.open { transform: translateY(0); }
        .drawer-handle { width: 40px; height: 4px; background: var(--border-color); border-radius: 2px; margin: 1rem auto 1.2rem; }
        .drawer-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 1rem; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 0; border-bottom: 1px solid var(--border-color); }
        .cat-info { display: flex; flex-direction: column; gap: 0.1rem; }
        .cat-name { font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem; }
        .cat-price-sub { font-size: 0.75rem; color: var(--text-muted); margin-left: 1.8rem; }
        .cat-qty { display: flex; align-items: center; gap: 0.7rem; }
        .qty-btn { background: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-main); width: 30px; height: 30px; border-radius: 50%; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        .qty-btn:active { background: var(--purple-light); }
        .qty-num { font-weight: 700; min-width: 18px; text-align: center; }
        .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 0.5rem; }
        .cart-total-label { font-size: 0.9rem; color: var(--text-muted); }
        .cart-total-value { font-size: 1.3rem; font-weight: 900; }
        .btn-pay { background: var(--text-main); color: var(--bg-card); border: none; width: 100%; padding: 1.05rem; border-radius: 18px; font-size: 1rem; font-weight: 700; box-shadow: 0 8px 20px rgba(0,0,0,0.15); cursor: pointer; margin-top: 1.1rem; transition: transform 0.15s; touch-action: manipulation; }
        .btn-pay:active { transform: scale(0.98); }
        .cart-empty-msg { text-align: center; color: var(--text-muted); padding: 2rem 0; font-size: 0.95rem; }

        /* FOOTER */
        .footer-checkout { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); padding: 0.8rem 1.5rem calc(0.8rem + var(--safe-bottom)); background: linear-gradient(to top, var(--bg-body) 80%, transparent); z-index: 90; max-width: 600px; width: 100%; }
        .footer-inner { display: flex; gap: 0.8rem; align-items: center; }
        .btn-view-cart { flex: 1; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 1rem; border-radius: 18px; font-size: 0.95rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: transform 0.15s; touch-action: manipulation; }
        .btn-view-cart:active { transform: scale(0.98); }
        .btn-checkout { flex: 2; background: var(--text-main); color: var(--bg-card); border: none; padding: 1rem; border-radius: 18px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: transform 0.15s; touch-action: manipulation; }
        .btn-checkout:active { transform: scale(0.98); }

        /* PAYMENT MODAL */
        .payment-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 2rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .payment-modal.open { opacity: 1; pointer-events: all; }
        .payment-box { background: var(--bg-card); border-radius: 24px; padding: 2rem; width: 100%; max-width: 380px; box-shadow: var(--shadow); position: relative; transform: translateY(20px); transition: transform 0.3s; }
        .payment-modal.open .payment-box { transform: translateY(0); }
        .payment-box h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 1rem; }
        .payment-box input { width: 100%; background: var(--bg-body); border: 1px solid var(--border-color); padding: 0.85rem 1.1rem; border-radius: 14px; color: var(--text-main); outline: none; font-size: 0.95rem; margin-bottom: 1rem; }
        .payment-box input:focus { border-color: var(--purple-accent); }
        .btn-close-pay { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }

        /* ── CHAT ── */
        #seccion-chat { display: none; flex-direction: column; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-body); z-index: 1000; padding-top: var(--safe-top); }
        .chat-header { padding: 1rem 1.5rem; background: var(--bg-card); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
        .chat-meta { display: flex; align-items: center; gap: 0.8rem; }
        .chat-status-dot { width: 9px; height: 9px; background: var(--green); border-radius: 50%; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%,100%{box-shadow: 0 0 0 2px rgba(52,199,89,0.3)} 50%{box-shadow: 0 0 0 6px rgba(52,199,89,0)} }
        .chat-header-info p:first-child { font-weight: 700; font-size: 0.95rem; }
        .chat-header-info p:last-child { font-size: 0.72rem; color: var(--text-muted); }
        
        .chat-header-actions { display: flex; gap: 0.65rem; align-items: center; }
        .btn-call-trigger { border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; transition: transform 0.15s, filter 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.08); touch-action: manipulation; }
        .btn-call-trigger:active { transform: scale(0.9); }
        .btn-call-trigger.audio-style { background: linear-gradient(135deg, #34c759, #28a745); }
        .btn-call-trigger.video-style { background: linear-gradient(135deg, #007aff, #0056b3); }
        .btn-call-trigger svg { width: 18px; height: 18px; fill: currentColor; }

        .btn-panic { background: var(--red); color: #fff; border: none; padding: 0.6rem 1.2rem; border-radius: 12px; font-size: 0.85rem; font-weight: 900; cursor: pointer; box-shadow: 0 4px 12px rgba(255,59,48,0.35); transition: transform 0.15s; touch-action: manipulation; }
        .btn-panic:active { transform: scale(0.95); }

        .name-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .name-modal-box { background: var(--bg-card); border-radius: 24px; padding: 2rem; width: 100%; max-width: 340px; text-align: center; }
        .name-modal-box h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .name-modal-box input { width: 100%; background: var(--bg-body); border: 1px solid var(--border-color); padding: 0.85rem 1.1rem; border-radius: 14px; color: var(--text-main); outline: none; font-size: 0.95rem; margin-bottom: 1rem; }
        .btn-join { width: 100%; background: var(--purple-accent); color: #fff; border: none; padding: 0.95rem; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; touch-action: manipulation; }

        .chat-messages { flex: 1; padding: 1.2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; position: relative; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
        .msg-wrap { display: flex; flex-direction: column; max-width: 78%; position: relative; transition: opacity 0.4s ease; }
        .msg-wrap.mine { align-self: flex-end; align-items: flex-end; }
        .msg-wrap.theirs { align-self: flex-start; align-items: flex-start; }
        
        /* ESTILO DEL NOMBRE DEL REMITENTE */
        .msg-sender { font-size: 0.72rem; font-weight: 600; color: var(--purple-accent); margin-bottom: 0.25rem; padding: 0 0.4rem; display: block; width: 100%; }
        .msg-wrap.mine .msg-sender { text-align: right; color: var(--text-muted); }

        .msg-body-container { display: flex; align-items: center; gap: 0.5rem; position: relative; width: 100%; }
        .msg-wrap.theirs .msg-body-container { justify-content: flex-start; }
        .msg-wrap.mine .msg-body-container { justify-content: flex-end; }
        
        /* BURBUJAS DE MENSAJES */
        .msg { padding: 0.85rem 1.05rem; border-radius: 20px; font-size: 0.92rem; line-height: 1.45; word-break: break-word; position: relative; }
        .msg.mine { background: var(--purple-accent); color: #fff; border-bottom-right-radius: 4px; }
        .msg.theirs { background: var(--bg-card); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        
        .msg.only-emoji-bubble { background: transparent !important; border: none !important; font-size: 2.85rem; padding: 0.2rem 0.5rem; line-height: 1.2; display: inline-block; }
        
        /* Animaciones de Emoticones */
        .ani-heart { display: inline-block; animation: whatsapp-heart 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1); transform-origin: center; }
        .ani-face { display: inline-block; animation: whatsapp-face 1.4s infinite ease-in-out; }
        .ani-fire { display: inline-block; animation: whatsapp-fire 1.8s infinite ease-in-out; transform-origin: bottom center; }
        .ani-bounce { display: inline-block; animation: whatsapp-generic 2s infinite ease-in-out; }

        @keyframes whatsapp-heart {
            0% { transform: scale(1); }
            14% { transform: scale(1.22); }
            28% { transform: scale(1); }
            42% { transform: scale(1.18); }
            70% { transform: scale(1); }
        }
        @keyframes whatsapp-face {
            0%, 100% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-8px) scale(1.05); }
            50% { transform: translateY(2px) scale(0.95); }
        }
        @keyframes whatsapp-fire {
            0%, 100% { transform: scale(1) rotate(-2deg); filter: brightness(1); }
            50% { transform: scale(1.1) rotate(3deg); filter: brightness(1.2); }
        }
        @keyframes whatsapp-generic {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        .destruct-timer { font-size: 0.7rem; font-weight: 700; width: 22px; height: 22px; border-radius: 50%; background: rgba(255, 59, 48, 0.15); color: var(--red); display: flex; align-items: center; justify-content: center; animation: pulse-timer 1s infinite alternate; flex-shrink: 0; }
        @keyframes pulse-timer { from { transform: scale(1); } to { transform: scale(1.1); } }
        .msg-time { font-size: 0.63rem; opacity: 0.5; margin-top: 0.25rem; padding: 0 0.5rem; }
        .disintegrating { pointer-events: none; }
        .particle { position: absolute; background: var(--purple-accent); border-radius: 50%; pointer-events: none; opacity: 0.8; }

        .typing-wrap { align-self: flex-start; display: none; align-items: center; gap: 0.5rem; padding: 0.5rem 0; }
        .typing-wrap.show { display: flex; }
        .typing-bubble { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; border-bottom-left-radius: 4px; padding: 0.75rem 1rem; display: flex; gap: 4px; align-items: center; }
        .dot { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
        .msg-system { align-self: center; font-size: 0.75rem; color: var(--text-muted); background: var(--bg-body); border: 1px solid var(--border-color); padding: 0.35rem 0.9rem; border-radius: 20px; }

        .chat-input-area { padding: 0.9rem 1.2rem calc(0.9rem + var(--safe-bottom)); background: var(--bg-card); border-top: 1px solid var(--border-color); display: flex; gap: 0.7rem; align-items: center; }
        .chat-input-area input { flex: 1; background: var(--bg-body); border: 1px solid var(--border-color); padding: 0.85rem 1.1rem; border-radius: 22px; color: var(--text-main); outline: none; font-size: 0.92rem; -webkit-appearance: none; }
        .btn-send { background: var(--purple-accent); color: #fff; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; touch-action: manipulation; }

        /* ── INTERFAZ DE LLAMADAS ESTILO FACETIME ── */
        #seccion-facetime { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; flex-direction: column; justify-content: space-between; padding: calc(var(--safe-top) + 2.5rem) 2rem calc(var(--safe-bottom) + 3.5rem); color: #fff; overscroll-behavior: none; }
        .ft-video-container { position: absolute; inset: 0; z-index: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .ft-video-remote { width: 100%; height: 100%; object-fit: cover; }
        .ft-video-local { position: absolute; top: 2rem; right: 2rem; width: 110px; height: 160px; border-radius: 18px; object-fit: cover; z-index: 5; border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 12px 24px rgba(0,0,0,0.4); transform: scaleX(-1); }
        
        .ft-overlay-info { position: relative; z-index: 2; text-align: center; margin-top: 1.5rem; }
        .ft-avatar { width: 96px; height: 96px; background: rgba(255,255,255,0.11); backdrop-filter: blur(25px); border-radius: 50%; margin: 0 auto 1.2rem; display: flex; align-items: center; justify-content: center; font-size: 2.4rem; font-weight: 500; border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 8px 32px rgba(0,0,0,0.2); text-transform: uppercase; color: #fff; }
        .ft-name { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.5px; }
        .ft-status { font-size: 0.92rem; color: rgba(255,255,255,0.55); margin-top: 0.4rem; font-weight: 400; letter-spacing: -0.1px; }

        .ft-controls-panel { position: relative; z-index: 2; background: rgba(28, 28, 30, 0.45); backdrop-filter: blur(35px) saturate(200%); -webkit-backdrop-filter: blur(35px) saturate(200%); padding: 1.1rem; border-radius: 38px; width: 100%; max-width: 340px; margin: 0 auto; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 24px 48px rgba(0,0,0,0.4); }

    ];

    let cart = {}; let curCat = 'all'; let toastTimer;
    let myName = ''; let myId = 'user_' + Math.random().toString(36).slice(2,8);
    let typingTimer; let seenKeys = new Set(); let inChat = false;

    let localStream; let peerConnection; let activeCallRef;

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    /* ── TIENDA Y RENDER ── */
    function renderStore() {
        const grid  = document.getElementById('productGrid');
        const queryVal = document.getElementById('searchBox').value.toLowerCase().trim();
        const list  = products.filter(p =>

                <button class="btn-add" onclick="addToCart(${p.id}, this)">+</button></div>
            </div>`).join('');
    }

    window.addToCart = function(id, btn) {
        cart[id] = (cart[id] || 0) + 1;
        const total = totalItems();

    function renderCartDrawer() {
        let totalPrice = 0;
        const html = Object.entries(cart).map(([idStr, qty]) => {

        }).join('');
        document.getElementById('cartItems').innerHTML = html || 'Vacío';
        document.getElementById('cartTotal').textContent = `$${totalPrice.toFixed(2)}`;
    }

    window.handleCheckout = function() {
        if (totalItems() === 5) {
            if (prompt("Canal seguro:") === SECRET_PIN_HASH) {
                document.getElementById('vista-tienda').style.display = 'none';

        } else { document.getElementById('paymentModal').classList.add('open'); }

    window.processPayment = function() { showToast("Completado"); closePaymentPortal(); cart={}; };
    window.filterCat = function(cat, btn) { document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active')); btn.classList.add('active'); curCat = cat; renderStore(); };
    window.filterSearch = function(input) { document.getElementById('searchClear').classList.toggle('visible', input.value.length > 0); renderStore(); };
    window.clearSearch = function() { document.getElementById('searchBox').value = ''; renderStore(); };
    
    window.toggleTheme = function() { 
        const currentTheme = document.body.getAttribute('data-theme');
        const systemIsDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        let targetTheme = 'dark';
        if (currentTheme === 'dark' || (!currentTheme && systemIsDark)) { targetTheme = 'light'; }
        document.body.setAttribute('data-theme', targetTheme); 
    };

    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

    /* ── PARSER DE EMOJIS ANIMADOS ── */
    function checkAndParseEmojiMessage(text) {
        if (!text) return { isEmoji: false, html: '' };
        const emojiRegex = /^([\u2000-\u3300\ud83c\ud83d\ud83e][\ud000-\udfff]?[\u200d\ufe0f]?)+$/g;
        const cleanText = text.replace(/\s/g, '');
        
        if (emojiRegex.test(cleanText)) {
            const segmenter = new Intl.Segmenter('es', { granularity: 'grapheme' });
            const segments = [...segmenter.segment(text.trim())].map(s => s.segment);
            
            const processedHtml = segments.map(char => {
                if (char === ' ' || char === ' ') return ' ';
                let animationClass = 'ani-bounce'; 
                if (['❤️','🖤','💙','💘','💕'].includes(char)) animationClass = 'ani-heart';
                if (['😀','😂','😉','😍','😘','😎','😜','😈'].includes(char)) animationClass = 'ani-face';
                if (['🔥','💥','⚡'].includes(char)) animationClass = 'ani-fire';
                return `<span class="${animationClass}">${char}</span>`;
            }).join('');
            return { isEmoji: true, html: processedHtml };
        }
        return { isEmoji: false, html: escHtml(text) };
    }

    /* ── CORE CENTRAL DEL CHAT ── */
    window.joinChat = function() {
        myName = document.getElementById('nameInput').value.trim(); if (!myName) return;
        inChat = true; document.getElementById('nameModal').style.display = 'none';
        set(presenceRef, { name: myName, online: true });
        
        // ARREGLADO: onDisconnect ahora purga correctamente tu estado de escritura flotante al salir
        onDisconnect(presenceRef).remove();
        onDisconnect(typingRef).remove();
        
        onValue(ref(db, 'chat/presence'), snapshot => {
            document.getElementById('onlineStatus').textContent = `${Object.values(snapshot.val() || {}).length} en línea`;
        });
        listenForIncomingCalls();
    };

    window.sendMsg = function() {
        const input = document.getElementById('chatInput'); if (!input.value.trim()) return;
        push(messagesRef, { type: 'text', text: input.value.trim(), sender: myName, senderId: myId, ts: Date.now() });
        input.value = '';
    };
    window.handleChatKey = function(e) { if (e.key === 'Enter') window.sendMsg(); };

    function renderMessage(msg, key) {
        const ws = document.getElementById('chatWorkspace');
        const typingWrap = document.getElementById('typingWrap');

        if (msg.type === 'system') {
            const div = document.createElement('div'); div.className = 'msg-system'; div.textContent = msg.text;
            ws.insertBefore(div, typingWrap); return;
        }

        const isMe = msg.senderId === myId;
        const wrap = document.createElement('div');
        wrap.className = `msg-wrap ${isMe ? 'mine' : 'theirs'}`;
        wrap.id = `wrap-${key}`;

        const parsedData = checkAndParseEmojiMessage(msg.text);
        const bubbleStyleClass = parsedData.isEmoji ? 'msg only-emoji-bubble' : `msg ${isMe ? 'mine' : 'theirs'}`;

        wrap.innerHTML = `
            ${!isMe ? `<span class="msg-sender">${escHtml(msg.sender || 'Anónimo')}</span>` : ''}
            <div class="msg-body-container">
                <div class="${bubbleStyleClass}">${parsedData.html}</div>
            </div>
            <span class="msg-time">${new Date(msg.ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
        `;

        ws.insertBefore(wrap, typingWrap);
        ws.scrollTop = ws.scrollHeight;

        // ARREGLADO: readByUpdate instanciado localmente para bloquear colisiones multinodo asíncronas
        if (!isMe && inChat && (!msg.readBy || !msg.readBy[myId])) { 
            const readUpdate = {};
            readUpdate[`chat/messages/${key}/readBy/${myId}`] = true;
            update(ref(db), readUpdate);
        }
        if (msg.readBy && Object.keys(msg.readBy).length > 0) { initiateThanosCountdown(key, wrap); }
    }

    function initiateThanosCountdown(key, element) {
        if (element.querySelector('.destruct-timer')) return;
        const bodyContainer = element.querySelector('.msg-body-container');
        const timerContainer = document.createElement('div');
        timerContainer.className = 'destruct-timer'; timerContainer.textContent = '10';
        bodyContainer.appendChild(timerContainer);

        let count = 10;
        const interval = setInterval(() => {
            count--; timerContainer.textContent = count;
            if (count <= 0) {
                clearInterval(interval);
                snapDisintegrateEffect(element, () => { element.remove(); remove(ref(db, `chat/messages/${key}`)); });
            }
        }, 1000);
    }

    function snapDisintegrateEffect(element, callback) {
        element.classList.add('disintegrating'); const rect = element.getBoundingClientRect();
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div'); particle.className = 'particle';
            const pSize = Math.random() * 4 + 2; particle.style.width = `${pSize}px`; particle.style.height = `${pSize}px`;
            particle.style.left = `${rect.left + window.scrollX + Math.random() * rect.width}px`;
            particle.style.top = `${rect.top + window.scrollY + Math.random() * rect.height}px`;
            document.body.appendChild(particle);
            const angle = Math.random() * Math.PI * 2; const velocity = Math.random() * 60 + 20;
            particle.animate([{ transform: 'translate(0, 0) scale(1)', opacity: 0.8 }, { transform: `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity - 50}px) scale(0)`, opacity: 0 }], { duration: Math.random() * 600 + 400 }).onfinish = () => particle.remove();
        }
        element.animate([{ opacity: 1, filter: 'blur(0px)' }, { opacity: 0, filter: 'blur(4px)' }], { duration: 500 }).onfinish = callback;
    }

    /* ── WEBRTC FACETIME SEÑALIZACIÓN COMPLETADA ── */
    async function setupLocalStream(type) {
        const constraints = { audio: true, video: type === 'video' ? { facingMode: 'user', width: 480, height: 640 } : false };
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('localVideo').style.display = type === 'video' ? 'block' : 'none';
    }

    window.initiateCall = async function(type) {
        document.getElementById('seccion-chat').style.display = 'none';
        document.getElementById('seccion-facetime').style.display = 'flex';
        document.getElementById('ftTargetName').textContent = "Canal Seguro";
        document.getElementById('ftCallStatus').textContent = `FaceTime de ${type === 'video' ? 'Video' : 'Audio'}...`;
        document.getElementById('ftAvatar').textContent = "C";
        document.getElementById('btnFtVideo').style.display = type === 'video' ? 'flex' : 'none';

        await setupLocalStream(type);
        activeCallRef = push(callsRef);
        await set(activeCallRef, { type: type, caller: myName, callerId: myId, status: 'calling' });

        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        
        peerConnection.onicecandidate = e => { if (e.candidate) push(ref(db, `chat/calls/${activeCallRef.key}/callerCandidates`), e.candidate.toJSON()); };
        peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; document.getElementById('ftAvatar').style.display = 'none'; };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        await update(activeCallRef, { offer: { type: offer.type, sdp: offer.sdp } });

        onValue(ref(db, `chat/calls/${activeCallRef.key}`), async snapshot => {
            const data = snapshot.val();
            if (data && data.status === 'accepted' && data.answer && !peerConnection.currentRemoteDescription) {
                document.getElementById('ftCallStatus').textContent = "Conectado";
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                // Vaciar la cola de candidatos ICE acumulados asincrónicamente
                while (remoteIceQueue.length > 0) {
                    await peerConnection.addIceCandidate(remoteIceQueue.shift());
                }
            }
            if (data && data.status === 'ended') cleanUpCallUI();
        });

        // ARREGLADO: Escucha asíncrona de candidatos ICE estructurada con cola reactiva de RTCIceCandidate
        onValue(ref(db, `chat/calls/${activeCallRef.key}/receiverCandidates`), snapshot => {
            if (snapshot.exists()) {
                Object.values(snapshot.val()).forEach(cand => {
                    const iceCandidate = new RTCIceCandidate(cand);
                    if (peerConnection && peerConnection.remoteDescription && peerConnection.remoteDescription.type) {
                        peerConnection.addIceCandidate(iceCandidate);
                    } else {
                        remoteIceQueue.push(iceCandidate);
                    }
                });
            }
        });
    };

    function listenForIncomingCalls() {
        // ARREGLADO: Matar canales duplicados concurrentes en llamadas entrantes antes de re-escuchar
        off(callsRef);
        onValue(callsRef, async snapshot => {
            if (!inChat) return; const calls = snapshot.val(); if (!calls) return;
            Object.entries(calls).forEach(([key, call]) => {
                if (call.callerId !== myId && call.status === 'calling') {
                    if (confirm(`FaceTime entrante de: ${call.caller}. ¿Contestar?`)) { acceptIncomingCall(key, call); }
                    else { set(ref(db, `chat/calls/${key}/status`), 'ended'); }
                }
            });
        });
    }

    async function acceptIncomingCall(key, call) {
        activeCallRef = ref(db, `chat/calls/${key}`);
        document.getElementById('seccion-chat').style.display = 'none'; document.getElementById('seccion-facetime').style.display = 'flex';
        document.getElementById('ftTargetName').textContent = call.caller; document.getElementById('ftAvatar').textContent = call.caller.charAt(0);
        await setupLocalStream(call.type);

        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        
        peerConnection.onicecandidate = e => { if (e.candidate) push(ref(db, `chat/calls/${key}/receiverCandidates`), e.candidate.toJSON()); };
        peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; document.getElementById('ftAvatar').style.display = 'none'; };

        await peerConnection.setRemoteDescription(new RTCSessionDescription(call.offer));
        const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer);
        await update(activeCallRef, { answer: { type: answer.type, sdp: answer.sdp }, status: 'accepted' });

        // Inyectar candidatos de la cola asíncrona una vez seteada la descripción
        while (remoteIceQueue.length > 0) {
            await peerConnection.addIceCandidate(remoteIceQueue.shift());
        }

        onValue(ref(db, `chat/calls/${key}/callerCandidates`), snapshot => {
            if (snapshot.exists()) {
                Object.values(snapshot.val()).forEach(cand => {
                    const iceCandidate = new RTCIceCandidate(cand);
                    if (peerConnection && peerConnection.remoteDescription && peerConnection.remoteDescription.type) {
                        peerConnection.addIceCandidate(iceCandidate);
                    } else {
                        remoteIceQueue.push(iceCandidate);
                    }
                });
            }
        });

        onValue(activeCallRef, snapshot => { if (snapshot.val() && snapshot.val().status === 'ended') cleanUpCallUI(); });
    }

    window.toggleMuteMic = function() { isMuted = !isMuted; localStream.getAudioTracks().forEach(t => t.enabled = !isMuted); document.getElementById('btnFtMute').classList.toggle('active', isMuted); };
    window.toggleVideoTrack = function() { isVideoOff = !isVideoOff; localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff); document.getElementById('btnFtVideo').classList.toggle('active', isVideoOff); };
    window.minimizeCallToChat = function() { document.getElementById('seccion-facetime').style.display = 'none'; document.getElementById('seccion-chat').style.display = 'flex'; };
    window.hangUpCall = function() { if (activeCallRef) update(activeCallRef, { status: 'ended' }); cleanUpCallUI(); };

    function cleanUpCallUI() {
        if (localStream) localStream.getTracks().forEach(track => track.stop()); if (peerConnection) peerConnection.close();
        remoteIceQueue = []; // Reset atómico de la cola WebRTC
        document.getElementById('seccion-facetime').style.display = 'none';
        document.getElementById('seccion-chat').style.display = inChat ? 'flex' : 'none';
        document.getElementById('vista-tienda').style.display = inChat ? 'none' : 'flex';
    }

    window.panicExit = function() { 
        window.hangUpCall(); 
        // ARREGLADO: Desconexión y purga atómica de canales y estados antes del reinicio
        off(messagesRef);
        off(callsRef);
        set(typingRef, null);
        set(presenceRef, null);
        remove(messagesRef).then(() => { location.reload(); }); 
    };

    /* ── BOOT RUN ── */
    renderStore();
    onValue(query(messagesRef, limitToLast(50)), (snapshot) => {
        const data = snapshot.val(); if (!data) return;
        Object.entries(data).forEach(([key, msg]) => { if (!seenKeys.has(key)) { seenKeys.add(key); renderMessage(msg, key); } });
    });
</script>
