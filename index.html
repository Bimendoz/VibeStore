<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeStore</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VibeStore">
    <style>
        /* ═══ iOS DESIGN TOKENS ═══ */
        :root {
            --bg-body:         #f2f2f7;
            --bg-card:         #ffffff;
            --bg-nav:          rgba(255,255,255,0.85);
            --text-primary:    #000000;
            --text-secondary:  #3c3c43;
            --text-tertiary:   #8e8e93;
            --separator:       rgba(60,60,67,.18);
            --fill-3:          rgba(118,118,128,.12);
            --fill-4:          rgba(118,118,128,.08);
            --purple:          #7c3aed;
            --purple-soft:     rgba(124,58,237,.12);
            --green:           #34c759;
            --green-soft:      rgba(52,199,89,.12);
            --blue:            #007aff;
            --blue-soft:       rgba(0,122,255,.12);
            --red:             #ff3b30;
            --sat: env(safe-area-inset-top,    47px);
            --sab: env(safe-area-inset-bottom, 34px);
            --header-h: 56px;
        }
        [data-theme="dark"] {
            --bg-body:        #000000;
            --bg-card:        #1c1c1e;
            --bg-nav:         rgba(28,28,30,0.88);
            --text-primary:   #ffffff;
            --text-secondary: #ebebf5;
            --text-tertiary:  #8e8e93;
            --separator:      rgba(84,84,88,.65);
            --fill-3:         rgba(118,118,128,.24);
            --fill-4:         rgba(118,118,128,.18);
            --purple:         #a78bfa;
            --purple-soft:    rgba(167,139,250,.15);
            --green:          #30d158;
            --green-soft:     rgba(48,209,88,.15);
            --blue:           #0a84ff;
            --blue-soft:      rgba(10,132,255,.15);
        }
        *, *::before, *::after {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        html { -webkit-text-size-adjust: 100%; }
        body {
            background: var(--bg-body); color: var(--text-primary);
            min-height: 100dvh; display: flex; flex-direction: column;
            overflow-x: hidden; transition: background .25s, color .25s;
        }

        /* ── HEADER ── */
        header {
            position: sticky; top: 0; z-index: 200;
            background: var(--bg-nav);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid var(--separator);
            padding-top: var(--sat);
        }
        .header-inner {
            height: var(--header-h); padding: 0 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
        .logo span { color: var(--purple); }
        .header-right { display: flex; align-items: center; gap: 6px; }

        /* ── ICON BUTTONS ── */
        .icon-btn {
            width: 34px; height: 34px; border: none;
            background: var(--fill-3); border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-primary); transition: opacity .15s;
            -webkit-appearance: none;
        }
        .icon-btn:active { opacity: .5; }
        .icon-btn svg { width: 17px; height: 17px; }
        .icon-btn.cart-btn { background: var(--purple-soft); color: var(--purple); position: relative; }
        .badge {
            position: absolute; top: -2px; right: -2px;
            background: var(--red); color: #fff;
            font-size: 10px; font-weight: 700;
            min-width: 16px; height: 16px; padding: 0 3px;
            border-radius: 100px; border: 1.5px solid var(--bg-body);
            display: flex; align-items: center; justify-content: center;
        }
        .badge.pop { animation: badge-pop .26s cubic-bezier(.36,.07,.19,.97); }
        @keyframes badge-pop { 0%,100%{transform:scale(1)} 45%{transform:scale(1.4)} 70%{transform:scale(.88)} }

        /* ── CATEGORY NAV ── */
        .cat-scroll {
            overflow-x: auto; white-space: nowrap;
            padding: 10px 16px;
            background: var(--bg-nav);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid var(--separator);
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .btn-cat {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--fill-4); border: none;
            color: var(--text-secondary); padding: 7px 14px;
            border-radius: 100px; font-size: 14px; font-weight: 500;
            margin-right: 6px; cursor: pointer; transition: all .18s;
            -webkit-appearance: none;
        }
        .btn-cat svg { width: 13px; height: 13px; flex-shrink: 0; }
        .btn-cat.active {
            background: var(--purple); color: #fff;
            box-shadow: 0 2px 8px rgba(124,58,237,.3);
        }

        /* ── MAIN ── */
        .main-content {
            flex: 1; padding: 14px 16px 0;
            max-width: 430px; margin: 0 auto; width: 100%;
        }

        /* ── SEARCH ── */
        .search-wrap { position: relative; margin-bottom: 14px; }
        .search-icon {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            color: var(--text-tertiary); pointer-events: none; display: flex;
        }
        .search-icon svg { width: 15px; height: 15px; }
        .search-input {
            width: 100%; background: var(--bg-card);
            border: 0.5px solid var(--separator);
            padding: 10px 34px 10px 32px;
            border-radius: 12px; color: var(--text-primary);
            outline: none; font-size: 15px;
            transition: border-color .2s, box-shadow .2s;
            -webkit-appearance: none;
        }
        .search-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-soft); }
        .search-input::placeholder { color: var(--text-tertiary); }
        .search-clear {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            background: var(--text-tertiary); border: none;
            width: 17px; height: 17px; border-radius: 50%;
            color: var(--bg-card); font-size: 10px; cursor: pointer;
            display: none; align-items: center; justify-content: center;
        }
        .search-clear.visible { display: flex; }

        /* ── GRID ── */
        .grid-productos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card {
            background: var(--bg-card); border-radius: 20px;
            border: 0.5px solid var(--separator);
            box-shadow: 0 1px 3px rgba(0,0,0,.07);
            overflow: hidden; display: flex; flex-direction: column;
            position: relative; transition: transform .18s;
        }
        .card:active { transform: scale(.97); }
        .img-container {
            width: 100%; aspect-ratio: 1/1;
            background: var(--fill-4); overflow: hidden;
            position: relative; display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
        }
        .img-container img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
        }
        .card-tag {
            position: absolute; top: 8px; left: 8px;
            background: rgba(255,255,255,.92); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #000; font-size: 9px; font-weight: 700;
            padding: 3px 8px; border-radius: 8px;
            text-transform: uppercase; letter-spacing: .04em; z-index: 2;
        }
        .card-body { padding: 10px 11px 12px; display: flex; flex-direction: column; flex: 1; }
        .card-title {
            font-size: 13px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
        }
        .card-desc {
            font-size: 11.5px; color: var(--text-tertiary);
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
            line-height: 1.4; margin-bottom: 10px; flex: 1;
        }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
        .btn-add {
            background: var(--text-primary); color: var(--bg-card);
            border: none; width: 30px; height: 30px; border-radius: 50%;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: transform .15s, background .2s;
            -webkit-appearance: none;
        }
        .btn-add:active { transform: scale(.84); }
        .btn-add.added { background: var(--green); animation: add-pop .3s ease; }
        @keyframes add-pop { 0%{transform:scale(1)} 50%{transform:scale(1.28)} 100%{transform:scale(1)} }

        /* ── FOOTER ── */
        .footer-checkout {
            position: sticky; bottom: 0; z-index: 100;
            padding: 10px 16px calc(10px + var(--sab));
            background: var(--bg-nav);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-top: 0.5px solid var(--separator);
            max-width: 430px; margin: 0 auto; width: 100%;
        }
        .footer-inner { display: flex; gap: 10px; }
        .btn-view-cart {
            flex: 1; background: var(--fill-3); color: var(--text-primary);
            border: none; padding: 14px 10px; border-radius: 14px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: opacity .15s; -webkit-appearance: none;
        }
        .btn-view-cart svg { width: 16px; height: 16px; }
        .btn-view-cart:active { opacity: .6; }
        .btn-checkout {
            flex: 2; background: var(--purple); color: #fff; border: none;
            padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 600;
            cursor: pointer; box-shadow: 0 4px 14px rgba(124,58,237,.3);
            transition: opacity .15s; -webkit-appearance: none;
        }
        .btn-checkout:active { opacity: .7; }

        /* ── CART DRAWER ── */
        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.35);
            z-index: 400; opacity: 0; pointer-events: none; transition: opacity .28s;
        }
        .drawer-overlay.open { opacity: 1; pointer-events: all; }
        .cart-drawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            max-width: 430px; margin: 0 auto;
            background: var(--bg-card); border-radius: 20px 20px 0 0;
            z-index: 401; transform: translateY(100%);
            transition: transform .34s cubic-bezier(.32,.72,0,1);
            padding: 0 20px calc(20px + var(--sab));
            max-height: 80vh; overflow-y: auto;
        }
        .cart-drawer.open { transform: translateY(0); }
        .drawer-handle { width: 36px; height: 4px; background: var(--separator); border-radius: 2px; margin: 10px auto 16px; }
        .drawer-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; }
        .cart-item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 0.5px solid var(--separator);
        }
        .cat-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; }
        .cat-qty { display: flex; align-items: center; gap: 12px; }
        .qty-btn {
            background: var(--fill-3); border: none; color: var(--text-primary);
            width: 28px; height: 28px; border-radius: 50%;
            font-size: 18px; font-weight: 300; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            -webkit-appearance: none;
        }
        .qty-btn:active { opacity: .5; }
        .qty-num { font-weight: 700; min-width: 16px; text-align: center; font-size: 15px; }
        .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
        .cart-total-label { font-size: 15px; color: var(--text-tertiary); }
        .cart-total-value { font-size: 20px; font-weight: 800; letter-spacing: -.5px; }
        .btn-pay {
            background: var(--purple); color: #fff; border: none;
            width: 100%; padding: 16px; border-radius: 14px;
            font-size: 16px; font-weight: 700;
            box-shadow: 0 4px 14px rgba(124,58,237,.3);
            cursor: pointer; margin-top: 14px;
            transition: opacity .15s; -webkit-appearance: none;
        }
        .btn-pay:active { opacity: .7; }
        .cart-empty-msg { text-align: center; color: var(--text-tertiary); padding: 32px 0; font-size: 15px; }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: calc(88px + var(--sab));
            left: 50%; transform: translateX(-50%) translateY(14px);
            background: rgba(28,28,30,.96); backdrop-filter: blur(16px);
            color: #fff; padding: 10px 18px; border-radius: 20px;
            font-size: 13.5px; font-weight: 500; white-space: nowrap;
            opacity: 0; transition: opacity .2s, transform .2s;
            z-index: 600; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── EMPTY STATE ── */
        .empty-state {
            grid-column: 1/-1; display: flex; flex-direction: column;
            align-items: center; gap: 6px; padding: 48px 16px;
            color: var(--text-tertiary); text-align: center;
        }
        .empty-state svg { width: 34px; height: 34px; margin-bottom: 6px; opacity: .4; }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.4);
            z-index: 500; display: none; align-items: flex-end; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--bg-card); border-radius: 20px 20px 0 0;
            width: 100%; max-width: 430px;
            padding: 0 20px calc(20px + var(--sab));
            max-height: 92dvh; overflow-y: auto;
        }
        .modal-handle { width: 36px; height: 4px; background: var(--separator); border-radius: 2px; margin: 10px auto 16px; }
        .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
        .modal-sub { font-size: 13px; color: var(--text-tertiary); margin-bottom: 20px; }
        .pin-wrap { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; }
        .pin-digit {
            width: 44px; height: 54px; border: 1px solid var(--separator);
            border-radius: 12px; font-size: 20px; font-weight: 700;
            text-align: center; background: var(--fill-4);
            color: var(--text-primary); outline: none;
            /* Prevents iOS zooming jump */
            font-size: 16px; 
            transition: border-color .2s, box-shadow .2s; -webkit-appearance: none;
        }
        .pin-digit:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-soft); font-size: 20px; }
        .pin-error { color: var(--red); font-size: 13px; text-align: center; min-height: 18px; margin-bottom: 10px; }
        .btn-primary {
            background: var(--purple); color: #fff; border: none;
            width: 100%; padding: 16px; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 14px rgba(124,58,237,.3);
            transition: opacity .15s; -webkit-appearance: none;
        }
        .btn-primary:active { opacity: .7; }
        .btn-secondary {
            background: var(--fill-4); color: var(--text-secondary); border: none;
            width: 100%; padding: 15px; border-radius: 14px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            margin-top: 10px; -webkit-appearance: none;
        }
        .btn-secondary:active { opacity: .6; }
        .pay-section { display: none; }
        .pay-section.active { display: block; }
        .form-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: .05em; }
        .form-input {
            width: 100%; background: var(--fill-4); border: 0.5px solid var(--separator);
            padding: 12px 14px; border-radius: 12px;
            color: var(--text-primary); outline: none;
            font-size: 15px; margin-bottom: 12px;
            transition: border-color .2s; -webkit-appearance: none;
        }
        .form-input:focus { border-color: var(--purple); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card-brand-row { display: flex; gap: 6px; margin-bottom: 14px; }
        .brand-chip { background: var(--fill-4); border: 0.5px solid var(--separator); border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 600; color: var(--text-tertiary); }
        .order-summary { background: var(--fill-4); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
        .order-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; color: var(--text-secondary); }
        .order-row.total { font-weight: 800; font-size: 16px; color: var(--text-primary); border-top: 0.5px solid var(--separator); padding-top: 10px; margin-top: 4px; margin-bottom: 0; }
        .secure-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-tertiary); justify-content: center; margin-top: 10px; }

        /* ── FLOATING NOTIFICATIONS (Estilo pro e interactivas) ── */
        .floating-notifs-container {
            position: fixed; top: calc(var(--sat) + 10px); left: 0; right: 0;
            z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 10px;
            pointer-events: none;
        }
        .floating-notif {
            width: calc(100% - 32px); max-width: 400px;
            background: rgba(28,28,30,.95); backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border: 0.5px solid rgba(255,255,255,.15); box-shadow: 0 10px 30px rgba(0,0,0,.3);
            border-radius: 18px; padding: 12px 16px;
            display: flex; align-items: center; gap: 12px; pointer-events: auto;
            transform: translateY(-20px); opacity: 0;
