<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeStore</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VibeStore">

    <style>
        :root {
            --bg-body: #f3f4f9;
            --bg-card: #ffffff;
            --bg-nav: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --purple-accent: #8b5cf6;
            --purple-light: #ede9fe;
            --green: #10b981;
            --red: #ef4444;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        [data-theme="dark"] {
            --bg-body: #0f0f12; --bg-card: #18181c; --bg-nav: #18181c;
            --text-main: #f8fafc; --text-muted: #94a3b8; --purple-accent: #a78bfa;
            --purple-light: #2e1065; --border-color: #27272a;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); transition: background-color 0.3s, color 0.3s; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* HEADER */
        header { background-color: var(--bg-nav); padding: calc(var(--safe-top) + 1rem) 1.5rem 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
        .header-actions { display: flex; align-items: center; gap: 1rem; }
        .icon-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: transform 0.15s; }
        .icon-btn:active { transform: scale(0.92); }
        .cart-btn { background: var(--purple-light); color: var(--purple-accent); position: relative; }
        .badge { position: absolute; top: -3px; right: -3px; background-color: var(--red); color: #fff; font-size: 0.65rem; font-weight: 800; min-width: 18px; height: 18px; padding: 0 4px; border-radius: 9px; border: 2px solid var(--bg-nav); display: flex; align-items: center; justify-content: center; }
        .badge.pop { animation: pop 0.3s cubic-bezier(0.36,0.07,0.19,0.97); }
        @keyframes pop { 0%,100%{transform:scale(1)} 40%{transform:scale(1.45)} 70%{transform:scale(0.9)} }

        /* NAV */
        .nav-scroller { overflow-x: auto; white-space: nowrap; padding: 0.85rem 1.5rem; background: var(--bg-nav); border-bottom: 1px solid var(--border-color); -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .nav-scroller::-webkit-scrollbar { display: none; }
        .btn-cat { display: inline-flex; align-items: center; gap: 0.3rem; background: transparent; border: none; color: var(--text-muted); padding: 0.55rem 1.1rem; border-radius: 20px; font-size: 0.9rem; font-weight: 600; margin-right: 0.4rem; cursor: pointer; transition: all 0.2s; }
        .btn-cat.active { background: var(--purple-accent); color: #fff; box-shadow: 0 4px 12px rgba(139,92,246,0.3); }

        /* MAIN */
        .main-content { flex: 1; padding: 1.2rem 1.2rem 0; max-width: 600px; margin: 0 auto; width: 100%; }
        .search-wrap { position: relative; margin-bottom: 1.1rem; }
        .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        .search-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); padding: 0.85rem 2.8rem 0.85rem 2.5rem; border-radius: 18px; color: var(--text-main); outline: none; font-size: 0.95rem; transition: border-color 0.25s, box-shadow 0.25s; }
        .search-input:focus { border-color: var(--purple-accent); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
        .search-clear { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; display: none; padding: 4px; }
        .search-clear.visible { display: block; }

        /* GRID */
        .grid-productos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .card { background: var(--bg-card); border-radius: 22px; padding: 0.75rem; border: 1px solid var(--border-color); box-shadow: var(--shadow); display: flex; flex-direction: column; position: relative; overflow: hidden; transition: transform 0.2s; }
        .card:active { transform: translateY(-2px); }
        .img-container { width: 100%; aspect-ratio: 1/1; border-radius: 16px; background: var(--purple-light); margin-bottom: 0.75rem; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .card-tag { position: absolute; top: 1.1rem; left: 1.1rem; background: rgba(255,255,255,0.92); backdrop-filter: blur(4px); color: #000; font-size: 0.6rem; font-weight: 700; padding: 3px 8px; border-radius: 8px; text-transform: uppercase; z-index: 2; }
        .card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-desc { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.75rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 30px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-weight: 800; font-size: 1.05rem; }
        .btn-add { background: var(--text-main); color: var(--bg-card); border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: 700; font-size: 1.15rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background-color 0.2s; flex-shrink: 0; }
        .btn-add:active { transform: scale(0.88); }
        .btn-add.added { background: var(--green); animation: addPop 0.35s ease; }
        @keyframes addPop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

        /* CART DRAWER */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .drawer-overlay.open { opacity: 1; pointer-events: all; }
        .cart-drawer { position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; background: var(--bg-card); border-radius: 28px 28px 0 0; z-index: 201; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); padding: 0 1.5rem calc(1.5rem + var(--safe-bottom)); max-height: 80vh; overflow-y: auto; }
        .cart-drawer.open { transform: translateY(0); }
        .drawer-handle { width: 40px; height: 4px; background: var(--border-color); border-radius: 2px; margin: 1rem auto 1.2rem; }
        .drawer-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 1rem; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 0; border-bottom: 1px solid var(--border-color); }
        .cat-name { font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem; }
        .cat-qty { display: flex; align-items: center; gap: 0.7rem; }
        .qty-btn { background: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-main); width: 30px; height: 30px; border-radius: 50%; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-btn:active { background: var(--purple-light); }
        .qty-num { font-weight: 700; min-width: 18px; text-align: center; }
        .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
        .cart-total-label { font-size: 0.9rem; color: var(--text-muted); }
        .cart-total-value { font-size: 1.3rem; font-weight: 900; }
        .btn-pay { background: var(--text-main); color: var(--bg-card); border: none; width: 100%; padding: 1.05rem; border-radius: 18px; font-size: 1rem; font-weight: 700; box-shadow: 0 8px 20px rgba(0,0,0,0.15); cursor: pointer; margin-top: 1.1rem; transition: transform 0.15s; }
        .btn-pay:active { transform: scale(0.98); }
        .cart-empty-msg { text-align: center; color: var(--text-muted); padding: 2rem 0; font-size: 0.95rem; }

        /* FOOTER */
        .footer-checkout { position: sticky; bottom: 0; padding: 0.8rem 1.5rem calc(0.8rem + var(--safe-bottom)); background: linear-gradient(to top, var(--bg-body) 80%, transparent); z-index: 90; max-width: 600px; margin: 0 auto; width: 100%; }
        .footer-inner { display: flex; gap: 0.8rem; align-items: center; }
        .btn-view-cart { flex: 1; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 1rem; border-radius: 18px; font-size: 0.95rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: transform 0.15s; }
        .btn-view-cart:active { transform: scale(0.98); }
        .btn-checkout { flex: 2; background: var(--text-main); color: var(--bg-card); border: none; padding: 1rem; border-radius: 18px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: transform 0.15s; }
        .btn-checkout:active { transform: scale(0.98); }

        /* TOAST */
        .toast { position: fixed; bottom: calc(5.5rem + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text-main); color: var(--bg-card); padding: 0.7rem 1.3rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; opacity: 0; transition: opacity 0.25s, transform 0.25s; z-index: 300; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* EMPTY STATE */
        .empty-state { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 3rem 1rem; color: var(--text-muted); text-align: center; }
        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        /* ── CHAT ── */
        #seccion-chat { display: none; flex-direction: column; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-body); z-index: 1000; padding-top: var(--safe-top); }

        .chat-header { padding: 1rem 1.5rem; background: var(--bg-card); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
        .chat-meta { display: flex; align-items: center; gap: 0.8rem; }
        .chat-status-dot { width: 9px; height: 9px; background: var(--green); border-radius: 50%; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 2px rgba(16,185,129,0.3)} 50%{box-shadow:0 0 0 6px rgba(16,185,129,0)} }
        .chat-header-info p:first-child { font-weight: 700; font-size: 0.95rem; }
        .chat-header-info p:last-child { font-size: 0.72rem; color: var(--text-muted); }
        .online-count { font-size: 0.72rem; color: var(--green); font-weight: 600; }

        .btn-panic { background: var(--red); color: #fff; border: none; padding: 0.6rem 1.2rem; border-radius: 12px; font-size: 0.85rem; font-weight: 900; cursor: pointer; box-shadow: 0 4px 12px rgba(239,68,68,0.35); transition: transform 0.15s; }
        .btn-panic:active { transform: scale(0.95); }

        /* Nombre modal */
        .name-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .name-modal-box { background: var(--bg-card); border-radius: 24px; padding: 2rem; width: 100%; max-width: 340px; text-align: center; }
        .name-modal-box h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .name-modal-box p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.2rem; }
        .name-modal-box input { width: 100%; background: var(--bg-body); border: 1px solid var(--border-color); padding: 0.85rem 1.1rem; border-radius: 14px; color: var(--text-main); outline: none; font-size: 0.95rem; margin-bottom: 1rem; }
        .name-modal-box input:focus { border-color: var(--purple-accent); }
        .btn-join { width: 100%; background: var(--purple-accent); color: #fff; border: none; padding: 0.95rem; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.15s; }
        .btn-join:active { transform: scale(0.98); }

        .chat-messages { flex: 1; padding: 1.2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; }

        .msg-wrap { display: flex; flex-direction: column; max-width: 78%; }
        .msg-wrap.mine { align-self: flex-end; align-items: flex-end; }
        .msg-wrap.theirs { align-self: flex-start; align-items: flex-start; }

        .msg-sender { font-size: 0.68rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.2rem; padding: 0 0.5rem; }

        .msg { padding: 0.85rem 1.05rem; border-radius: 20px; font-size: 0.92rem; line-height: 1.45; word-break: break-word; }
        .msg.mine { background: var(--purple-accent); color: #fff; border-bottom-right-radius: 4px; }
        .msg.theirs { background: var(--bg-card); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }

        .msg-time { font-size: 0.63rem; opacity: 0.5; margin-top: 0.25rem; padding: 0 0.5rem; }

        /* Typing indicator */
        .typing-wrap { align-self: flex-start; display: none; align-items: center; gap: 0.5rem; padding: 0.5rem 0; }
        .typing-wrap.show { display: flex; }
        .typing-bubble { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; border-bottom-left-radius: 4px; padding: 0.75rem 1rem; display: flex; gap: 4px; align-items: center; }
        .typing-name { font-size: 0.72rem; color: var(--text-muted); }
        .dot { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

        /* System message */
        .msg-system { align-self: center; font-size: 0.75rem; color: var(--text-muted); background: var(--bg-body); border: 1px solid var(--border-color); padding: 0.35rem 0.9rem; border-radius: 20px; }

        .chat-input-area { padding: 0.9rem 1.2rem calc(0.9rem + var(--safe-bottom)); background: var(--bg-card); border-top: 1px solid var(--border-color); display: flex; gap: 0.7rem; align-items: center; }
        .chat-input-area input { flex: 1; background: var(--bg-body); border: 1px solid var(--border-color); padding: 0.85rem 1.1rem; border-radius: 22px; color: var(--text-main); outline: none; font-size: 0.92rem; transition: border-color 0.2s; }
        .chat-input-area input:focus { border-color: var(--purple-accent); }
        .btn-send { background: var(--purple-accent); color: #fff; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s; }
        .btn-send:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="vista-tienda" style="display:flex;flex-direction:column;min-height:100vh;">
    <header>
        <div class="logo">VibeStore ✦</div>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" aria-label="Cambiar tema">🌙</button>
            <button class="icon-btn cart-btn" onclick="openCart()" aria-label="Ver carrito">
                🛍️<span class="badge" id="cartBadge">0</span>
            </button>
        </div>
    </header>

    <nav class="nav-scroller">
        <button class="btn-cat active" onclick="filterCat('all',this)">⚡ Todo</button>
        <button class="btn-cat" onclick="filterCat('maquillaje',this)">💄 Maquillaje</button>
        <button class="btn-cat" onclick="filterCat('tecnologia',this)">🔌 Tecnología</button>
        <button class="btn-cat" onclick="filterCat('hogar',this)">🏠 Hogar</button>
        <button class="btn-cat" onclick="filterCat('deportes',this)">⚽ Deportes</button>
    </nav>

    <main class="main-content">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="search" id="searchBox" class="search-input" placeholder="Buscar productos…" oninput="filterSearch(this)" autocomplete="off">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
        </div>
        <div class="grid-productos" id="productGrid"></div>
    </main>

    <div class="footer-checkout">
        <div class="footer-inner">
            <button class="btn-view-cart" onclick="openCart()">🛍️ Carrito <span id="footerCount">(0)</span></button>
            <button class="btn-checkout" onclick="handleCheckout()">Pagar →</button>
        </div>
    </div>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
    <div class="drawer-handle"></div>
    <h2 class="drawer-title">Tu carrito</h2>
    <div id="cartItems"></div>
    <div class="cart-total-row">
        <span class="cart-total-label">Total estimado</span>
        <span class="cart-total-value" id="cartTotal">$0.00</span>
    </div>
    <button class="btn-pay" onclick="closeCart(); handleCheckout();">Proceder al Pago</button>
</div>

<div class="toast" id="toast"></div>

<div id="seccion-chat">

    <div class="name-modal" id="nameModal">
        <div class="name-modal-box">
            <h2>👋 ¿Cómo te llamas?</h2>
            <p>Tu nombre aparecerá en el chat seguro</p>
            <input type="text" id="nameInput" placeholder="Tu nombre o alias…" maxlength="20" onkeypress="if(event.key==='Enter') joinChat()">
            <button class="btn-join" onclick="joinChat()">Entrar al canal →</button>
        </div>
    </div>

    <div class="chat-header">
        <div class="chat-meta">
            <div class="chat-status-dot"></div>
            <div class="chat-header-info">
                <p>SecureChannel</p>
                <p id="onlineStatus">Conectando…</p>
            </div>
        </div>
        <button class="btn-panic" onclick="panicExit()">⚠ PÁNICO</button>
    </div>

    <div class="chat-messages" id="chatWorkspace">
        <div class="typing-wrap" id="typingWrap">
            <span class="typing-name" id="typingName"></span>
            <div class="typing-bubble">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Escribe un mensaje seguro…" onkeypress="handleChatKey(event)" autocomplete="off" oninput="handleTyping()">
        <button class="btn-send" onclick="sendMsg()">➤</button>
    </div>
</div>

<script type="module">

    const CAT_META = {
        maquillaje: { emoji: '💄', avgPrice: 20 },

        { id:3,  cat:'maquillaje', name:'Base Hydra Glow',         desc:'Acabado natural con ácido hialurónico.',               price:29.00, img:'https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=300' },
        { id:4,  cat:'maquillaje', name:'Máscara Lash Lift',       desc:'Volumen extremo y curvas perfectas sin grumos.',       price:16.00, img:'https://images.unsplash.com/photo-1631214524020-5e18d974dd33?w=300' },

        { id:6,  cat:'maquillaje', name:'Fijador de Maquillaje',   desc:'Bruma hidratante acabado mate larga duración.',        price:15.00, img:'https://images.unsplash.com/photo-1608248597481-496100c8c836?w=300' },
        { id:7,  cat:'maquillaje', name:'Corrector Full Coverage', desc:'Oculta imperfecciones de forma ligera.',               price:14.20, img:'https://images.unsplash.com/photo-1599733589046-10c005739ef9?w=300' },

        { id:32, cat:'deportes',   name:'Bandas de Resistencia',   desc:'Set de 5 intensidades con agarres cómodos.',         price:16.50, img:'https://images.unsplash.com/photo-1517838277536-f5f99be501cd?w=300' },
        { id:33, cat:'deportes',   name:'Mat de Yoga Ecológico',   desc:'Grosor antideslizante de 6mm TPE premium.',           price:35.00, img:'https://images.unsplash.com/photo-1601925260368-ae2f83cf8b7f?w=300' },
        { id:34, cat:'deportes',   name:'Cuerda Saltar Speed',     desc:'Baleros de alta velocidad entrenamiento funcional.',  price:12.00, img:'https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?w=300' },
        { id:35, cat:'deportes',   name:'Mancuernas Neopreno Hex', desc:'Par de pesas de 2.5kg con diseño texturizado.',      price:24.00, img:'https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=300' },
        { id:36, cat:'deportes',   name:'Maletín Deportivo Active',desc:'Compartimento separado para tenis húmedos.',         price:39.00, img:'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=300' },
        { id:37, cat:'deportes',   name:'Rodillo Masajeador Foam', desc:'Liberación miofascial post-entrenamiento.',          price:19.50, img:'https://images.unsplash.com/photo-1600881333168-2ef49b341f30?w=300' },
        { id:38, cat:'deportes',   name:'Guantes Gimnasio Breath', desc:'Protección con gel antideslizante en las palmas.',   price:14.00, img:'https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=300' },
        { id:39, cat:'deportes',   name:'Smart Shaker Pro',        desc:'Mezclador de proteína con compartimentos internos.',  price:15.90, img:'https://images.unsplash.com/photo-1593079831268-3381b0db4a77?w=300' },
        { id:40, cat:'deportes',   name:'Toalla Microfibra Dry',   desc:'Secado súper rápido, compacta y ultra absorbente.',   price:9.99,  img:'https://images.unsplash.com/photo-1576678927484-cc9079a28901?w=300' },
    ];

    /* ── STATE ── */
    let cart      = { maquillaje:0, tecnologia:0, hogar:0, deportes:0 };
    let curCat    = 'all';
    let toastTimer;
    let myName    = '';
    let myId      = 'user_' + Math.random().toString(36).slice(2,8);
    let typingTimer;
    let seenKeys  = new Set();

    const SECRET_PIN = atob("MTAyMzEwMTg=");

    /* ── REFS Firebase ── */
    const messagesRef = ref(db, 'chat/messages');
    const typingRef   = ref(db, 'chat/typing/' + myId);
    const presenceRef = ref(db, 'chat/presence/' + myId);

    /* ════════════════════
       STORE
    ════════════════════ */
    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderStore() {
        const grid  = document.getElementById('productGrid');
        const query = document.getElementById('searchBox').value.toLowerCase().trim();
        const list  = products.filter(p =>
            (curCat === 'all' || p.cat === curCat) &&
            (p.name.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query))
        );
        if (!list.length) {
            grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Sin resultados</p><small>Prueba otra categoría.</small></div>`;
            return;
        }
        grid.innerHTML = list.map(p => `
            <div class="card">
                <span class="card-tag">${CAT_META[p.cat].emoji} ${p.cat}</span>
                <div class="img-container">
                    ${CAT_META[p.cat].emoji}
                    <img src="${p.img}" alt="${escHtml(p.name)}" loading="lazy" onerror="this.style.display='none'">
                </div>
                <div>
                    <h3 class="card-title" title="${escHtml(p.name)}">${escHtml(p.name)}</h3>
                    <p class="card-desc">${escHtml(p.desc)}</p>
                </div>
                <div class="card-footer">
                    <span class="price">$${p.price.toFixed(2)}</span>
                    <button class="btn-add" id="btn-${p.id}" onclick="addToCart('${p.cat}',${p.id},this)">+</button>
                </div>
            </div>`).join('');
    }

    window.addToCart = function(cat, id, btn) {
        cart[cat]++;
        const total = totalItems();
        const badge = document.getElementById('cartBadge');
        badge.textContent = total;
        badge.classList.remove('pop');
        void badge.offsetWidth;
        badge.classList.add('pop');
        btn.classList.add('added'); btn.textContent = '✓';
        setTimeout(() => { btn.classList.remove('added'); btn.textContent = '+'; }, 700);
        document.getElementById('footerCount').textContent = `(${total})`;
        const p = products.find(x => x.id === id);
        showToast(`${p.name} añadido ✓`);
    };

    function changeQty(cat, delta) {
        cart[cat] = Math.max(0, cart[cat] + delta);
        const total = totalItems();
        document.getElementById('cartBadge').textContent = total;
        document.getElementById('footerCount').textContent = `(${total})`;
        renderCartDrawer();
    }
    window.changeQty = changeQty;

    function totalItems() { return Object.values(cart).reduce((a,b)=>a+b,0); }

    window.openCart = function() { renderCartDrawer(); document.getElementById('drawerOverlay').classList.add('open'); document.getElementById('cartDrawer').classList.add('open'); };
    window.closeCart = function() { document.getElementById('drawerOverlay').classList.remove('open'); document.getElementById('cartDrawer').classList.remove('open'); };

    function renderCartDrawer() {
        const wrap = document.getElementById('cartItems');
        const total = totalItems();
        if (!total) {
            wrap.innerHTML = `<div class="cart-empty-msg">🛒 Tu carrito está vacío.</div>`;
            document.getElementById('cartTotal').textContent = '$0.00';
            return;
        }
        const estimated = Object.entries(cart).filter(([,v])=>v>0).reduce((acc,[cat,qty])=>acc+CAT_META[cat].avgPrice*qty,0);
        wrap.innerHTML = Object.entries(cart).filter(([,v])=>v>0).map(([cat,qty])=>`
            <div class="cart-item-row">
                <span class="cat-name">${CAT_META[cat].emoji} ${cat.charAt(0).toUpperCase()+cat.slice(1)}</span>
                <div class="cat-qty">
                    <button class="qty-btn" onclick="changeQty('${cat}',-1)">−</button>
                    <span class="qty-num">${qty}</span>
                    <button class="qty-btn" onclick="changeQty('${cat}',1)">+</button>
                </div>
            </div>`).join('');
        document.getElementById('cartTotal').textContent = `~$${estimated.toFixed(2)}`;
    }

    window.filterCat = function(cat, btn) {
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        curCat = cat;
        renderStore();
    };

    window.filterSearch = function(input) {
        document.getElementById('searchClear').classList.toggle('visible', input.value.length > 0);
        renderStore();
    };

    window.clearSearch = function() {
        const box = document.getElementById('searchBox');
        box.value = '';
        document.getElementById('searchClear').classList.remove('visible');
        renderStore();
    };

    window.toggleTheme = function() {
        const dark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', dark ? '' : 'dark');
        document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    window.handleCheckout = function() {
        if (!totalItems()) { showToast('Tu carrito está vacío 🛒'); return; }
        const m = cart.maquillaje, t = cart.tecnologia, h = cart.hogar, d = cart.deportes;
        if ((m+t===5) && h===0 && d===0) {
            const pin = prompt("Canal seguro detectado. Ingresa el PIN:");
            if (pin === SECRET_PIN) {
                document.getElementById('vista-tienda').style.display = 'none';
                document.getElementById('seccion-chat').style.display = 'flex';
                resetCart();
                // Mostrar modal de nombre
                document.getElementById('nameModal').style.display = 'flex';
                setTimeout(() => document.getElementById('nameInput').focus(), 100);
            } else if (pin !== null) {
                showToast('PIN incorrecto.');
                resetCart();
            }
        } else {
            showToast('Error de comunicación con el banco. Intenta más tarde.');
            resetCart();
        }
    };

    function resetCart() {
        cart = { maquillaje:0, tecnologia:0, hogar:0, deportes:0 };
        document.getElementById('cartBadge').textContent = '0';
        document.getElementById('footerCount').textContent = '(0)';
        window.closeCart();
    }

    /* ════════════════════
       CHAT REAL (Firebase)
    ════════════════════ */

    // Permiso para notificaciones sigilosas
    if ("Notification" in window && Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    const fakeNotifications = [
        "🔥 ¡Oferta flash: 50% de descuento en maquillaje!",
        "⚡ Envío gratis en tu próxima compra de tecnología.",
        "🏠 ¡Nuevos artículos para el hogar disponibles!",
        "⚽ ¡Rebajas de temporada en toda la sección de deportes!",
        "🎁 Cupón secreto desbloqueado: revisa tu bandeja.",
        "🌟 Producto estrella de la semana con rebaja."
    ];

    const offerSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869.wav");

    window.joinChat = function() {
        const input = document.getElementById('nameInput');
        const name  = input.value.trim();
        if (!name) { input.focus(); return; }
        myName = name;
        document.getElementById('nameModal').style.display = 'none';
        document.getElementById('chatInput').focus();

        // Presencia: marcar online y limpiar al desconectar
        set(presenceRef, { name: myName, online: true });
        onDisconnect(presenceRef).remove();

        // Limpiar typing al desconectar
        onDisconnect(typingRef).remove();

        // Escuchar mensajes en tiempo real
        onValue(messagesRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            Object.entries(data).forEach(([key, msg]) => {
                if (!seenKeys.has(key)) {
                    seenKeys.add(key);
                    renderMessage(msg);

                    // Alerta de oferta sigilosa (sonido y notificación) para mensajes de otros usuarios
                    if (msg.type === 'text' && msg.senderId !== myId) {
                        offerSound.play().catch(err => console.log("Audio bloqueado por el navegador"));
                        if ("Notification" in window && Notification.permission === "granted") {
                            const randomMsg = fakeNotifications[Math.floor(Math.random() * fakeNotifications.length)];
                            new Notification("VibeStore", {
                                body: randomMsg,
                                icon: "https://images.unsplash.com/photo-1512496015851-a90fb38ba796?w=100"
                            });
                        }
                    }
                }
            });
        });

        // Escuchar presencia (quién está online)
        const presAllRef = ref(db, 'chat/presence');
        onValue(presAllRef, (snapshot) => {
            const data = snapshot.val() || {};
            const users = Object.values(data).filter(u => u.online);
            const count = users.length;
            document.getElementById('onlineStatus').textContent =
                count === 1 ? '1 persona en línea' : `${count} personas en línea`;
        });

        // Escuchar typing de otros
        const typingAllRef = ref(db, 'chat/typing');
        onValue(typingAllRef, (snapshot) => {
            const data = snapshot.val() || {};
            const others = Object.entries(data)
                .filter(([id, v]) => id !== myId && v && v.name)
                .map(([, v]) => v.name);
            const wrap = document.getElementById('typingWrap');
            const nameEl = document.getElementById('typingName');
            if (others.length > 0) {
                nameEl.textContent = others[0] + ' está escribiendo';
                wrap.classList.add('show');
                scrollChat();
            } else {
                wrap.classList.remove('show');
            }
        });

        // Mensaje de bienvenida al sistema
        pushSystemMsg(`${myName} entró al canal`);
    };

    function renderMessage(msg) {
        const ws = document.getElementById('chatWorkspace');
        const typingWrap = document.getElementById('typingWrap');

        if (msg.type === 'system') {
            const div = document.createElement('div');
            div.className = 'msg-system';
            div.textContent = msg.text;
            ws.insertBefore(div, typingWrap);
            scrollChat();
            return;
        }

        const isMe = msg.senderId === myId;
        const time  = msg.ts ? new Date(msg.ts).toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' }) : '';

        const wrap = document.createElement('div');
        wrap.className = `msg-wrap ${isMe ? 'mine' : 'theirs'}`;
        wrap.innerHTML = `
            ${!isMe ? `<span class="msg-sender">${escHtml(msg.sender)}</span>` : ''}
            <div class="msg ${isMe ? 'mine' : 'theirs'}">${escHtml(msg.text)}</div>
            <span class="msg-time">${time}</span>
        `;
        ws.insertBefore(wrap, typingWrap);
        scrollChat();
    }

    function scrollChat() {
        const ws = document.getElementById('chatWorkspace');
        ws.scrollTop = ws.scrollHeight;
    }

    function pushSystemMsg(text) {
        push(messagesRef, { type: 'system', text, ts: Date.now() });
    }

    window.sendMsg = function() {
        const input = document.getElementById('chatInput');
        const txt   = input.value.trim();
        if (!txt || !myName) return;

        push(messagesRef, {
            type: 'text',
            text: txt,
            sender: myName,
            senderId: myId,
            ts: Date.now()
        });

        // Limpiar typing
        set(typingRef, null);
        clearTimeout(typingTimer);
        input.value = '';
    };

    window.handleChatKey = function(e) { if (e.key === 'Enter') window.sendMsg(); };

    window.handleTyping = function() {
        if (!myName) return;
        set(typingRef, { name: myName });
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => set(typingRef, null), 2000);
    };

    window.panicExit = function() {
        if (confirm('¿Salir y borrar rastro de la base de datos?')) {
            // Elimina por completo los mensajes del canal al presionar pánico
            remove(messagesRef).then(() => {
                set(presenceRef, null);
                set(typingRef, null);
                location.reload();
            }).catch((err) => {
                console.error("Error al limpiar historial", err);
                location.reload();
            });
        }
    };

    /* ── INIT ── */
    renderStore();

</script>
</body>
