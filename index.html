<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VibeStore — Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #050507;
    --surface-glass: rgba(20, 20, 25, 0.65);
    --surface-solid: #121217;
    --border-glass: rgba(255, 255, 255, 0.08);
    --text-main: #f5f5f7;
    --text-muted: #86868b;
    --purple-dark: #552583; /* Acento principal serio y elegante */
    --purple-glow: rgba(85, 37, 131, 0.4);
    --red-panic: #ef4444;
    --green-safe: #10b981;
    --card-radius: 24px;
    --pill-radius: 100px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    overscroll-behavior-y: none; 
    -webkit-user-select: none; 
    user-select: none;
    overflow-x: hidden;
  }

  input, textarea, [contenteditable] {
    -webkit-user-select: auto;
    user-select: auto;
    -webkit-touch-callout: default;
  }

  /* ── NAVBAR LIQUID GLASS ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface-glass);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-glass);
    padding: calc(var(--safe-top) + 12px) 24px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
    color: var(--text-main);
  }
  .nav-actions { display: flex; gap: 16px; align-items: center; }
  .icon-btn {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass);
    color: var(--text-main); border-radius: 50%;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.2rem; transition: transform 0.2s, background 0.2s;
    position: relative;
  }
  .icon-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.1); }
  .cart-badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--purple-dark); color: white;
    font-size: 0.65rem; font-weight: 800;
    border-radius: 50%; min-width: 18px; height: 18px; padding: 0 4px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg-deep); box-shadow: 0 0 10px var(--purple-glow);
  }

  /* ── BUSCADOR Y CATEGORÍAS ── */
  .search-wrap { padding: 20px 24px 10px; position: relative; }
  .search-input {
    width: 100%; background: var(--surface-solid); border: 1px solid var(--border-glass);
    padding: 14px 20px 14px 44px; border-radius: var(--pill-radius);
    color: var(--text-main); outline: none; font-size: 0.95rem; font-family: inherit;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .search-input:focus { border-color: var(--purple-dark); box-shadow: 0 0 0 2px var(--purple-glow); }
  .search-icon { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

  .cats-scroll {
    display: flex; gap: 12px; overflow-x: auto; padding: 10px 24px 20px;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .cats-scroll::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex-shrink: 0; background: var(--surface-solid); border: 1px solid var(--border-glass);
    border-radius: var(--pill-radius); padding: 10px 20px; color: var(--text-muted);
    font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.3s;
    display: flex; align-items: center; gap: 8px;
  }
  .cat-chip.active { background: var(--text-main); color: var(--bg-deep); border-color: var(--text-main); }

  /* ── GRID DINÁMICO ── */
  .main-content { padding: 0 24px 120px; max-width: 1200px; margin: 0 auto; }
  .prod-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px;
  }
  .prod-card {
    background: var(--surface-solid); border: 1px solid var(--border-glass);
    border-radius: var(--card-radius); overflow: hidden; padding: 12px;
    display: flex; flex-direction: column; transition: transform 0.2s, background 0.3s;
  }
  .prod-card:active { transform: scale(0.97); background: rgba(255,255,255,0.03); }
  .prod-img-wrap {
    width: 100%; aspect-ratio: 1/1; border-radius: 16px; background: #1a1a20;
    overflow: hidden; position: relative; margin-bottom: 12px;
  }
  .prod-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; opacity: 0.9;
    transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .prod-card:active .prod-img-wrap img { transform: scale(1.08); }
  .prod-info { flex: 1; display: flex; flex-direction: column; }
  .prod-name { font-size: 0.85rem; font-weight: 600; line-height: 1.3; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .prod-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
  .prod-price { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.5px; }
  .btn-add {
    background: var(--purple-dark); color: white; border: none;
    width: 32px; height: 32px; border-radius: 50%; font-size: 1.2rem; font-weight: 300;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 4px 12px var(--purple-glow); transition: transform 0.2s;
  }
  .btn-add:active { transform: scale(0.85); }

  /* ── CAJÓN DEL CARRITO LIQUID GLASS ── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .cart-drawer {
    position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto;
    background: var(--surface-glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    border-top: 1px solid var(--border-glass); border-radius: 32px 32px 0 0;
    z-index: 201; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
    padding: 0 24px calc(24px + var(--safe-bottom)); max-height: 85vh; overflow-y: auto;
    box-shadow: 0 -20px 40px rgba(0,0,0,0.5);
  }
  .cart-drawer.open { transform: translateY(0); }
  .drawer-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 16px auto 24px; }
  .drawer-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
  .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border-glass); }
  .cat-name { font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; }
  .cat-qty { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); border-radius: var(--pill-radius); padding: 4px; }
  .qty-btn { background: transparent; border: none; color: var(--text-main); width: 28px; height: 28px; border-radius: 50%; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .qty-num { font-weight: 700; min-width: 20px; text-align: center; }
  .btn-pay {
    background: var(--text-main); color: var(--bg-deep); border: none; width: 100%;
    padding: 16px; border-radius: var(--pill-radius); font-size: 1.05rem; font-weight: 700;
    margin-top: 24px; cursor: pointer; transition: transform 0.2s;
  }
  .btn-pay:active { transform: scale(0.98); }

  /* ── MODALES & SISTEMA OCULTO ── */
  .payment-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .payment-modal.open { opacity: 1; pointer-events: all; }
  .payment-box { background: var(--surface-solid); border: 1px solid var(--border-glass); border-radius: var(--card-radius); padding: 32px 24px; width: 100%; max-width: 400px; transform: translateY(30px); transition: transform 0.4s; }
  .payment-modal.open .payment-box { transform: translateY(0); }
  .payment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-weight: 700; font-size: 1.2rem;}
  .pay-input { width: 100%; background: var(--bg-deep); border: 1px solid var(--border-glass); color: var(--text-main); padding: 14px; border-radius: 12px; margin-bottom: 12px; outline: none; font-family: inherit; }
  .pay-input:focus { border-color: var(--purple-dark); }
  .pay-row { display: flex; gap: 12px; }

  /* TOAST CAMUFLADO */
  .toast-promo { position: fixed; top: calc(var(--safe-top) + 20px); left: 50%; transform: translateX(-50%) translateY(-150%); background: var(--surface-glass); backdrop-filter: blur(16px); border: 1px solid var(--border-glass); padding: 12px 20px; border-radius: var(--pill-radius); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 4000; opacity: 0; transition: transform 0.4s, opacity 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 500; font-size: 0.9rem; color: var(--text-main); width: max-content; max-width: 90%; }
  .toast-promo.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── CHAT SEGURO (SERIO Y MINIMALISTA) ── */
  #seccion-chat { display: none; flex-direction: column; position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; padding-top: var(--safe-top); }
  .chat-header { padding: 12px 24px; background: var(--surface-glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-glass); display: flex; align-items: center; justify-content: space-between; }
  .chat-meta { display: flex; align-items: center; gap: 12px; }
  .chat-status-dot { width: 8px; height: 8px; background: var(--green-safe); border-radius: 50%; box-shadow: 0 0 8px var(--green-safe); }
  .chat-header-info p:first-child { font-weight: 700; font-size: 1rem; letter-spacing: 0.5px; }
  .chat-header-info p:last-child { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
  
  /* Botones WebRTC en el Header */
  .chat-av-controls { display: flex; gap: 8px; }
  .btn-av { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border-glass); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
  .btn-av:active { background: rgba(255,255,255,0.1); }
  .btn-panic { background: var(--red-panic); color: white; border: none; padding: 0 16px; height: 36px; border-radius: var(--pill-radius); font-weight: 800; font-size: 0.8rem; cursor: pointer; margin-left: 8px; box-shadow: 0 0 15px rgba(239,68,68,0.4); }

  .name-modal { position: fixed; inset: 0; background: var(--bg-deep); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .name-modal-box { background: var(--surface-solid); padding: 40px 32px; border-radius: var(--card-radius); text-align: center; width: 100%; max-width: 340px; border: 1px solid var(--border-glass); }
  .name-modal-box input { width: 100%; background: var(--bg-deep); border: 1px solid var(--border-glass); color: var(--text-main); padding: 16px; border-radius: 12px; margin: 24px 0; outline: none; text-align: center; font-family: inherit; font-size: 1rem; }
  .btn-join { background: var(--text-main); color: var(--bg-deep); border: none; padding: 16px; border-radius: var(--pill-radius); width: 100%; font-weight: 700; cursor: pointer; }

  .chat-messages { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .msg-wrap { display: flex; flex-direction: column; max-width: 85%; }
  .msg-wrap.mine { align-self: flex-end; align-items: flex-end; }
  .msg-wrap.theirs { align-self: flex-start; align-items: flex-start; }
  .msg-sender { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; padding: 0 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
  .msg { padding: 14px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
  .msg.mine { background: var(--purple-dark); color: white; border-bottom-right-radius: 4px; }
  .msg.theirs { background: var(--surface-solid); color: var(--text-main); border: 1px solid var(--border-glass); border-bottom-left-radius: 4px; }

  .chat-input-area { padding: 16px 24px calc(16px + var(--safe-bottom)); background: var(--surface-glass); backdrop-filter: blur(20px); border-top: 1px solid var(--border-glass); display: flex; gap: 12px; align-items: center; }
  .chat-input-area input { flex: 1; background: var(--bg-deep); border: 1px solid var(--border-glass); color: var(--text-main); padding: 14px 20px; border-radius: var(--pill-radius); outline: none; font-family: inherit; font-size: 0.95rem; }
  .btn-send { background: var(--purple-dark); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 12px var(--purple-glow); }

  /* ── FACETIME VIDEO UI (RESTAURADO) ── */
  #video-modal { position: fixed; inset: 0; background: #000; z-index: 15000; display: none; flex-direction: column; overflow: hidden; }
  .remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }
  .local-video { width: 110px; height: 160px; object-fit: cover; position: absolute; bottom: 120px; right: 20px; z-index: 2; border-radius: 16px; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #1a1a1a; }
  .video-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 3; display: flex; gap: 20px; background: rgba(20,20,25,0.8); backdrop-filter: blur(15px); padding: 12px 24px; border-radius: var(--pill-radius); border: 1px solid var(--border-glass); }
  .btn-hangup { background: var(--red-panic); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }
  .call-overlay { position: absolute; inset: 0; z-index: 4; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
  .timer-circle { font-size: 3.5rem; font-weight: 300; margin-bottom: 16px; font-variant-numeric: tabular-nums; }
  .call-status-text { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
</style>
</head>
<body>

<div id="vista-tienda">
  <!-- ── NAVBAR ── -->
  <nav>
    <div class="nav-logo">VibeStore</div>
    <div class="nav-actions">
      <button class="icon-btn" onclick="toggleTheme()">🌑</button>
      <button class="icon-btn" onclick="handleCheckout()">
        🛒<span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </nav>

  <!-- ── SEARCH & CATEGORIES ── -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchBox" class="search-input" placeholder="Buscar en el catálogo..." oninput="filterStore()">
  </div>
  
  <div class="cats-scroll">
    <div class="cat-chip active" onclick="setCat('all', this)">⚡ Todos</div>
    <div class="cat-chip" onclick="setCat('tech', this)">💻 Tecnología</div>
    <div class="cat-chip" onclick="setCat('av', this)">🎥 Audiovisual</div>
    <div class="cat-chip" onclick="setCat('home', this)">🛋️ Hogar</div>
  </div>

  <!-- ── PRODUCT GRID ── -->
  <main class="main-content">
    <div class="prod-grid" id="prodGrid">
      <!-- Los productos se inyectan por JS -->
    </div>
  </main>
</div>

<!-- ── CAJÓN DEL CARRITO ── -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-handle"></div>
  <h2 class="drawer-title">Resumen de Orden</h2>
  <div id="cartItems"></div>
  <button class="btn-pay" onclick="closeCart(); handleCheckout();">Procesar Pago Seguro</button>
</div>

<!-- ── PORTAL DE PAGOS (Checkout Normal) ── -->
<div class="payment-modal" id="paymentModal">
  <div class="payment-box">
      <div class="payment-header">
          <span>Checkout</span>
          <button class="icon-btn" style="width:30px;height:30px;border:none;" onclick="closePaymentPortal()">✕</button>
      </div>
      <input type="tel" class="pay-input" placeholder="Número de tarjeta" maxlength="19">
      <input type="text" class="pay-input" placeholder="Titular">
      <div class="pay-row">
          <input type="tel" class="pay-input" placeholder="MM/AA" maxlength="5">
          <input type="tel" class="pay-input" placeholder="CVC" maxlength="4">
      </div>
      <button class="btn-pay" style="margin-top:10px;" onclick="processPayment()">Confirmar</button>
  </div>
</div>

<!-- ── TOAST CAMUFLADO ── -->
<div class="toast-promo" id="toastPromo"></div>

<!-- ── CHAT SEGURO ── -->
<div id="seccion-chat">
  <div class="name-modal" id="nameModal">
      <div class="name-modal-box">
          <h2 style="font-weight:700; margin-bottom:8px;">Autenticación</h2>
          <p style="color:var(--text-muted); font-size:0.85rem;">Canal Cifrado P2P</p>
          <input type="text" id="nameInput" placeholder="Identificador" maxlength="20" onkeypress="if(event.key==='Enter') joinChat()">
          <button class="btn-join" onclick="joinChat()">Establecer Conexión</button>
      </div>
  </div>

  <div class="chat-header">
      <div class="chat-meta">
          <div class="chat-status-dot"></div>
          <div class="chat-header-info">
              <p>SecureNet</p>
              <p id="onlineStatus">Validando...</p>
          </div>
      </div>
      <div class="chat-av-controls">
          <button class="btn-av" onclick="startCall(false)" title="Audio">📞</button>
          <button class="btn-av" onclick="startCall(true)" title="Video">📹</button>
          <button class="btn-panic" onclick="panicExit()" title="Destruir">PÁNICO</button>
      </div>
  </div>

  <div class="chat-messages" id="chatWorkspace">
      <div id="typingWrap" style="display:none; color:var(--text-muted); font-size:0.75rem; padding: 0 12px; font-style:italic; text-transform:uppercase; letter-spacing:0.5px;"><span id="typingName"></span> escribiendo...</div>
  </div>

  <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Transmisión cifrada..." onkeypress="handleChatKey(event)" autocomplete="off" oninput="handleTyping()">
      <button class="btn-send" onclick="sendMsg()">↑</button>
  </div>
</div>

<!-- ── FACETIME VIDEO UI (RESTAURADO) ── -->
<div id="video-modal">
  <video id="remote-video" class="remote-video" autoplay playsinline></video>
  <video id="local-video" class="local-video" autoplay playsinline muted></video>
  
  <div id="call-overlay" class="call-overlay" style="display:none;">
      <div id="call-timer" class="timer-circle">60</div>
      <p class="call-status-text">Negociando claves P2P...</p>
  </div>

  <div class="video-controls">
      <button class="btn-hangup" onclick="hangUp(false, true)" title="Finalizar">☎</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, set, onDisconnect, remove }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  /* ── FIREBASE CONFIG ── */
  const firebaseConfig = {
      apiKey: "AIzaSyCRohVemM4oac8n7IN3fJmHg1mCYCrJiDo",
      authDomain: "data-base-store-3bbf8.firebaseapp.com",
      databaseURL: "https://data-base-store-3bbf8-default-rtdb.firebaseio.com",
      projectId: "data-base-store-3bbf8",
      storageBucket: "data-base-store-3bbf8.firebasestorage.app",
      messagingSenderId: "705642961874",
      appId: "1:705642961874:web:06262c925765027ee7460b"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── ESTADO Y VARIABLES GLOBALES ──
  const SECRET_PIN = "10231121";
  let myName = '';
  let myId = 'user_' + Math.random().toString(36).slice(2,8);
  let inChat = false; 
  let typingTimer;
  let seenKeys = new Set();
  
  // Variables Tienda
  let cart = { tech:0, av:0, home:0 };
  let currentCat = 'all';

  const messagesRef = ref(db, 'chat/messages');
  const typingRef = ref(db, 'chat/typing/' + myId);
  const presenceRef = ref(db, 'chat/presence/' + myId);
  
  // WebRTC Refs Restauradas
  const callOfferRef = ref(db, 'chat/call/offer');
  const callAnswerRef = ref(db, 'chat/call/answer');
  const callOfferCandRef = ref(db, 'chat/call/offerCandidates');
  const callAnswerCandRef = ref(db, 'chat/call/answerCandidates');

  // ── INYECCIÓN DINÁMICA DE PRODUCTOS ──
  const products = [
    { id:1, cat:'tech', name:'MacBook Pro M3 Max', price:3499.00, img:'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400' },
    { id:2, cat:'tech', name:'iPad Pro OLED 13"', price:1299.00, img:'https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=400' },
    { id:3, cat:'av', name:'Blackmagic Studio 6K Pro', price:2495.00, img:'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400' },
    { id:4, cat:'av', name:'ATEM Mini Extreme ISO', price:1295.00, img:'https://images.unsplash.com/photo-1593640408182-31c70c8268f5?w=400' },
    { id:5, cat:'tech', name:'iPhone 15 Pro Titanium', price:999.00, img:'https://images.unsplash.com/photo-1695048064971-8b2b73bc11eb?w=400' },
    { id:6, cat:'home', name:'Lámpara Diseño Nórdico', price:149.00, img:'https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=400' },
    { id:7, cat:'av', name:'Microfono Shure SM7B', price:399.00, img:'https://images.unsplash.com/photo-1590602847861-f357a9332bbc?w=400' },
    { id:8, cat:'home', name:'Silla Ergonómica Premium', price:599.00, img:'https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?w=400' }
  ];

  function renderStore() {
      const grid = document.getElementById('prodGrid');
      const q = document.getElementById('searchBox').value.toLowerCase().trim();
      const list = products.filter(p => (currentCat==='all' || p.cat===currentCat) && p.name.toLowerCase().includes(q));
      
      grid.innerHTML = list.map(p => `
          <div class="prod-card">
              <div class="prod-img-wrap"><img src="${p.img}" loading="lazy"></div>
              <div class="prod-info">
                  <div class="prod-name">${p.name}</div>
                  <div class="prod-bottom">
                      <span class="prod-price">$${p.price.toFixed(2)}</span>
                      <button class="btn-add" onclick="addToCart('${p.cat}')">+</button>
                  </div>
              </div>
          </div>`).join('');
  }

  window.setCat = function(cat, el) {
      document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      currentCat = cat;
      renderStore();
  }
  window.filterStore = () => renderStore();
  
  window.addToCart = function(cat) {
      cart[cat]++;
      const total = Object.values(cart).reduce((a,b)=>a+b,0);
      document.getElementById('cartBadge').textContent = total;
  };

  // ── LÓGICA DE CHECKOUT Y CARRITO ──
  window.openCart = () => {
    const w = document.getElementById('cartItems');
    const total = Object.values(cart).reduce((a,b)=>a+b,0);
    if(total === 0) { w.innerHTML = '<p style="color:var(--text-muted); text-align:center;">Carrito vacío</p>'; }
    else {
        w.innerHTML = Object.entries(cart).filter(([,v])=>v>0).map(([c,q])=>`
            <div class="cart-item-row">
                <span class="cat-name">${c.toUpperCase()}</span>
                <span class="qty-num">x${q}</span>
            </div>`).join('');
    }
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('cartDrawer').classList.add('open');
  };
  
  window.closeCart = () => {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('cartDrawer').classList.remove('open');
  };

  window.handleCheckout = function() {
      const totalCount = Object.values(cart).reduce((a,b)=>a+b,0);
      if (totalCount === 5) {
          window.closeCart();
          const pin = prompt("Acceso Seguro Requerido. Ingrese PIN:");
          if (pin === SECRET_PIN) {
              document.getElementById('vista-tienda').style.display = 'none';
              document.getElementById('seccion-chat').style.display = 'flex';
              document.getElementById('nameModal').style.display = 'flex';
              cart = { tech:0, av:0, home:0 };
              document.getElementById('cartBadge').textContent = '0';
          } else if (pin !== null) { alert('Llave incorrecta.'); }
      } else if (totalCount > 0) {
          window.closeCart();
          document.getElementById('paymentModal').classList.add('open');
      } else {
          window.openCart();
      }
  };

  window.closePaymentPortal = () => document.getElementById('paymentModal').classList.remove('open');
  window.processPayment = () => { 
      setTimeout(()=>{ 
          window.closePaymentPortal(); 
          cart = { tech:0, av:0, home:0 }; 
          document.getElementById('cartBadge').textContent = '0';
      }, 1000); 
  };

  // ── NOTIFICACIONES CAMUFLADAS ──
  const promos = ["⚡ Flash Sale: 30% OFF", "✨ Restock de temporada", "📦 Envío Premium activado"];
  function showPromoToast() {
      const div = document.getElementById('toastPromo');
      div.innerHTML = `<span style="font-size:1.2rem">✨</span> <span>${promos[Math.floor(Math.random() * promos.length)]}</span>`;
      div.classList.add('show');
      setTimeout(() => div.classList.remove('show'), 4000);
  }

  // ── CHAT SEGURO FIREBASE ──
  function escHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  window.joinChat = function() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) return;
      myName = name; inChat = true;
      document.getElementById('nameModal').style.display = 'none';

      set(presenceRef, { name: myName, online: true });
      onDisconnect(presenceRef).remove(); onDisconnect(typingRef).remove();

      onValue(ref(db, 'chat/presence'), snap => {
          const data = snap.val() || {}; const c = Object.values(data).filter(u=>u.online).length;
          document.getElementById('onlineStatus').textContent = `${c} Activos`;
      });

      onValue(ref(db, 'chat/typing'), snap => {
          const data = snap.val() || {}; const others = Object.entries(data).filter(([id,v])=>id!==myId && v&&v.name).map(([,v])=>v.name);
          const w = document.getElementById('typingWrap'); 
          if(others.length) { document.getElementById('typingName').textContent = others[0]; w.style.display = 'block'; scrollChat(); } 
          else w.style.display = 'none';
      });
      
      getPendingOffer(); // Inicia escucha de WebRTC
  };

  function renderMessage(msg) {
      const ws = document.getElementById('chatWorkspace');
      const isMe = msg.senderId === myId;
      const wrap = document.createElement('div');
      
      wrap.className = `msg-wrap ${isMe ? 'mine' : 'theirs'}`;
      wrap.innerHTML = `${!isMe ? `<span class="msg-sender">${escHtml(msg.sender)}</span>` : ''}
          <div class="msg ${isMe ? 'mine' : 'theirs'}">${escHtml(msg.text)}</div>
          <span class="msg-time">${new Date(msg.ts).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}</span>`;
      
      ws.insertBefore(wrap, document.getElementById('typingWrap'));
      scrollChat();
  }
  
  function scrollChat() { document.getElementById('chatWorkspace').scrollTop = 9999; }

  window.sendMsg = function() {
      const i = document.getElementById('chatInput'); if(!i.value.trim() || !myName) return;
      push(messagesRef, { type: 'text', text: i.value, sender: myName, senderId: myId, ts: Date.now() });
      set(typingRef, null); i.value = '';
  };
  
  window.handleChatKey = e => { if(e.key==='Enter') window.sendMsg(); };
  window.handleTyping = () => { if(!myName) return; set(typingRef, {name:myName}); clearTimeout(typingTimer); typingTimer = setTimeout(()=>set(typingRef,null), 2000); };

  window.panicExit = function() {
      remove(messagesRef).then(() => {
          set(presenceRef, null);
          set(typingRef, null);
          hangUp(false, false);
          location.reload();
      });
  };

  onValue(messagesRef, snap => {
      const data = snap.val(); if(!data) return;
      Object.entries(data).forEach(([k, msg]) => {
          if(!seenKeys.has(k)) {
              seenKeys.add(k);
              if (inChat) { renderMessage(msg); } 
              else if (msg.senderId !== myId && msg.type !== 'system-bot') { showPromoToast(); }
          }
      });
  });

  // ── WEBRTC LÓGICA RESTAURADA (LLAMADAS/VIDEO) ──
  const rtcConfig = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
  let pc, localStream, remoteStream, callTimeout;
  let iceProcOff = new Set(), iceProcAns = new Set();

  async function initMedia(videoEnabled = true) {
      localStream = await navigator.mediaDevices.getUserMedia({ video: videoEnabled, audio: true });
      const localVidEl = document.getElementById('local-video');
      localVidEl.srcObject = localStream;
      localVidEl.style.display = videoEnabled ? 'block' : 'none';

      remoteStream = new MediaStream();
      document.getElementById('remote-video').srcObject = remoteStream;
      
      pc = new RTCPeerConnection(rtcConfig);
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      pc.ontrack = e => e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));
  }

  window.startCall = async function(videoEnabled = true) {
      document.getElementById('video-modal').style.display = 'flex';
      document.getElementById('call-overlay').style.display = 'flex';
      await initMedia(videoEnabled);

      pc.onicecandidate = e => { if(e.candidate) push(callOfferCandRef, e.candidate.toJSON()); };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      set(callOfferRef, { sdp: offer.sdp, type: offer.type, callerId: myId, video: videoEnabled });

      let tl = 60; document.getElementById('call-timer').innerText = tl;
      callTimeout = setInterval(() => {
          tl--; document.getElementById('call-timer').innerText = tl;
          if(tl <= 0) hangUp(true, false); 
      }, 1000);

      onValue(callAnswerRef, snap => {
          const ans = snap.val();
          if(ans && !pc.currentRemoteDescription) {
              pc.setRemoteDescription(new RTCSessionDescription(ans));
              clearInterval(callTimeout);
              document.getElementById('call-overlay').style.display = 'none';
          }
      });

      onValue(callAnswerCandRef, snap => {
          const data = snap.val();
          if(data) Object.entries(data).forEach(([k, c]) => {
              if(!iceProcAns.has(k)) { iceProcAns.add(k); pc.addIceCandidate(new RTCIceCandidate(c)); }
          });
      });
  };

  async function getPendingOffer() {
      onValue(callOfferRef, async snap => {
          const offer = snap.val();
          if (offer && offer.callerId !== myId) {
              if (!inChat) {
                  showPromoToast(); // Camuflaje si te llaman y no estás dentro
              } else if (!pc) {
                  document.getElementById('video-modal').style.display = 'flex';
                  document.getElementById('call-overlay').style.display = 'none';
                  await initMedia(offer.video);

                  pc.onicecandidate = e => { if(e.candidate) push(callAnswerCandRef, e.candidate.toJSON()); };
                  
                  await pc.setRemoteDescription(new RTCSessionDescription(offer));
                  const ans = await pc.createAnswer();
                  await pc.setLocalDescription(ans);
                  set(callAnswerRef, { type: ans.type, sdp: ans.sdp });

                  onValue(callOfferCandRef, snapCand => {
                      const data = snapCand.val();
                      if(data) Object.entries(data).forEach(([k, c]) => {
                          if(!iceProcOff.has(k)) { iceProcOff.add(k); pc.addIceCandidate(new RTCIceCandidate(c)); }
                      });
                  });
              }
          } else if (!offer && pc) {
              hangUp(false, false);
          }
      });
  }

  window.hangUp = function(isMissed = false, sendMissedMessage = false) {
      if(callTimeout) clearInterval(callTimeout);
      if(localStream) localStream.getTracks().forEach(t => t.stop());
      if(pc) { pc.close(); pc = null; }
      
      document.getElementById('video-modal').style.display = 'none';
      remove(ref(db, 'chat/call'));
      iceProcOff.clear(); iceProcAns.clear();

      if(isMissed && sendMissedMessage) {
          push(messagesRef, { type: 'system-bot', text: 'Transmisión finalizada o perdida.', ts: Date.now() });
      }
  };

  // Inicializar tienda
  renderStore();

</script>
</body>
</html>
