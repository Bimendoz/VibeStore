<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeStore</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VibeStore">
    <style>
        :root {
            --bg-body: #f3f4f9; --bg-card: #ffffff; --bg-nav: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b;
            --purple-accent: #8b5cf6; --purple-light: #ede9fe;
            --green: #10b981; --red: #ef4444; --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        [data-theme="dark"] {
            --bg-body:#0f0f12; --bg-card:#18181c; --bg-nav:#18181c;
            --text-main:#f8fafc; --text-muted:#94a3b8; --purple-accent:#a78bfa;
            --purple-light:#2e1065; --border-color:#27272a;
            --shadow:0 10px 25px -5px rgba(0,0,0,0.5);
        }
        *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
        body{background-color:var(--bg-body);color:var(--text-main);transition:background-color .3s,color .3s;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}

        /* HEADER */
        header{background-color:var(--bg-nav);padding:calc(var(--safe-top) + 1rem) 1.5rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-color);position:sticky;top:0;z-index:100;}
        .logo{font-size:1.4rem;font-weight:800;letter-spacing:-.5px;}
        .header-actions{display:flex;align-items:center;gap:1rem;}
        .icon-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-main);display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;transition:transform .15s;}
        .icon-btn:active{transform:scale(.92);}
        .cart-btn{background:var(--purple-light);color:var(--purple-accent);position:relative;}
        .badge{position:absolute;top:-3px;right:-3px;background-color:var(--red);color:#fff;font-size:.65rem;font-weight:800;min-width:18px;height:18px;padding:0 4px;border-radius:9px;border:2px solid var(--bg-nav);display:flex;align-items:center;justify-content:center;}
        .badge.pop{animation:pop .3s cubic-bezier(.36,.07,.19,.97);}
        @keyframes pop{0%,100%{transform:scale(1)}40%{transform:scale(1.45)}70%{transform:scale(.9)}}

        /* NAV */
        .nav-scroller{overflow-x:auto;white-space:nowrap;padding:.85rem 1.5rem;background:var(--bg-nav);border-bottom:1px solid var(--border-color);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
        .nav-scroller::-webkit-scrollbar{display:none;}
        .btn-cat{display:inline-flex;align-items:center;gap:.3rem;background:transparent;border:none;color:var(--text-muted);padding:.55rem 1.1rem;border-radius:20px;font-size:.9rem;font-weight:600;margin-right:.4rem;cursor:pointer;transition:all .2s;}
        .btn-cat.active{background:var(--purple-accent);color:#fff;box-shadow:0 4px 12px rgba(139,92,246,.3);}

        /* MAIN */
        .main-content{flex:1;padding:1.2rem 1.2rem 0;max-width:600px;margin:0 auto;width:100%;}
        .search-wrap{position:relative;margin-bottom:1.1rem;}
        .search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;}
        .search-input{width:100%;background:var(--bg-card);border:1px solid var(--border-color);padding:.85rem 2.8rem .85rem 2.5rem;border-radius:18px;color:var(--text-main);outline:none;font-size:.95rem;transition:border-color .25s,box-shadow .25s;}
        .search-input:focus{border-color:var(--purple-accent);box-shadow:0 0 0 3px rgba(139,92,246,.15);}
        .search-clear{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);font-size:1rem;cursor:pointer;display:none;padding:4px;}
        .search-clear.visible{display:block;}

        /* GRID */
        .grid-productos{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;}
        .card{background:var(--bg-card);border-radius:22px;padding:.75rem;border:1px solid var(--border-color);box-shadow:var(--shadow);display:flex;flex-direction:column;position:relative;overflow:hidden;transition:transform .2s;}
        .card:active{transform:translateY(-2px);}
        .img-container{width:100%;aspect-ratio:1/1;border-radius:16px;background:var(--purple-light);margin-bottom:.75rem;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative;}
        .img-container img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
        .card-tag{position:absolute;top:1.1rem;left:1.1rem;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);color:#000;font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:8px;text-transform:uppercase;z-index:2;}
        .card-title{font-size:.9rem;font-weight:700;margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .card-desc{font-size:.72rem;color:var(--text-muted);margin-bottom:.75rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:30px;}
        .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;}
        .price{font-weight:800;font-size:1.05rem;}
        .btn-add{background:var(--text-main);color:var(--bg-card);border:none;width:32px;height:32px;border-radius:50%;font-weight:700;font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background-color .2s;flex-shrink:0;}
        .btn-add:active{transform:scale(.88);}
        .btn-add.added{background:var(--green);animation:addPop .35s ease;}
        @keyframes addPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

        /* CART DRAWER */
        .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
        .drawer-overlay.open{opacity:1;pointer-events:all;}
        .cart-drawer{position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;background:var(--bg-card);border-radius:28px 28px 0 0;z-index:201;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);padding:0 1.5rem calc(1.5rem + var(--safe-bottom));max-height:80vh;overflow-y:auto;}
        .cart-drawer.open{transform:translateY(0);}
        .drawer-handle{width:40px;height:4px;background:var(--border-color);border-radius:2px;margin:1rem auto 1.2rem;}
        .drawer-title{font-size:1.15rem;font-weight:800;margin-bottom:1rem;}
        .cart-item-row{display:flex;justify-content:space-between;align-items:center;padding:.8rem 0;border-bottom:1px solid var(--border-color);}
        .cat-name{font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:.5rem;}
        .cat-qty{display:flex;align-items:center;gap:.7rem;}
        .qty-btn{background:var(--bg-body);border:1px solid var(--border-color);color:var(--text-main);width:30px;height:30px;border-radius:50%;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
        .qty-btn:active{background:var(--purple-light);}
        .qty-num{font-weight:700;min-width:18px;text-align:center;}
        .cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;}
        .cart-total-label{font-size:.9rem;color:var(--text-muted);}
        .cart-total-value{font-size:1.3rem;font-weight:900;}
        .btn-pay{background:var(--text-main);color:var(--bg-card);border:none;width:100%;padding:1.05rem;border-radius:18px;font-size:1rem;font-weight:700;box-shadow:0 8px 20px rgba(0,0,0,.15);cursor:pointer;margin-top:1.1rem;transition:transform .15s;}
        .btn-pay:active{transform:scale(.98);}
        .cart-empty-msg{text-align:center;color:var(--text-muted);padding:2rem 0;font-size:.95rem;}

        /* FOOTER */
        .footer-checkout{position:sticky;bottom:0;padding:.8rem 1.5rem calc(.8rem + var(--safe-bottom));background:linear-gradient(to top,var(--bg-body) 80%,transparent);z-index:90;max-width:600px;margin:0 auto;width:100%;}
        .footer-inner{display:flex;gap:.8rem;align-items:center;}
        .btn-view-cart{flex:1;background:var(--bg-card);color:var(--text-main);border:1px solid var(--border-color);padding:1rem;border-radius:18px;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:transform .15s;}
        .btn-view-cart:active{transform:scale(.98);}
        .btn-checkout{flex:2;background:var(--text-main);color:var(--bg-card);border:none;padding:1rem;border-radius:18px;font-size:.95rem;font-weight:700;cursor:pointer;transition:transform .15s;}
        .btn-checkout:active{transform:scale(.98);}

        /* TOAST */
        .toast{position:fixed;bottom:calc(5.5rem + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--text-main);color:var(--bg-card);padding:.7rem 1.3rem;border-radius:20px;font-size:.85rem;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .25s,transform .25s;z-index:300;pointer-events:none;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

        /* EMPTY STATE */
        .empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:3rem 1rem;color:var(--text-muted);text-align:center;}
        .empty-state .empty-icon{font-size:2.5rem;margin-bottom:.5rem;}

        /* ═══════════════════════════════
           CHAT SECTION
        ═══════════════════════════════ */
        #seccion-chat{display:none;flex-direction:column;position:fixed;top:0;left:0;width:100vw;height:100vh;background:var(--bg-body);z-index:1000;padding-top:var(--safe-top);}

        .chat-header{padding:1rem 1.5rem;background:var(--bg-card);border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;}
        .chat-meta{display:flex;align-items:center;gap:.8rem;}
        .chat-status-dot{width:9px;height:9px;background:var(--green);border-radius:50%;animation:pulse-dot 2s infinite;}
        @keyframes pulse-dot{0%,100%{box-shadow:0 0 0 2px rgba(16,185,129,.3)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0)}}
        .chat-header-info p:first-child{font-weight:700;font-size:.95rem;}
        .chat-header-info p:last-child{font-size:.72rem;color:var(--text-muted);}

        /* BOTONES CABECERA CHAT */
        .chat-header-actions{display:flex;align-items:center;gap:.5rem;}
        /* Camuflados como "Soporte" */
        .btn-support-call{background:var(--green);color:#fff;border:none;padding:.5rem .9rem;border-radius:12px;font-size:.75rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:.35rem;transition:transform .15s;}
        .btn-support-call:active{transform:scale(.95);}
        .btn-support-video{background:#3b82f6;color:#fff;border:none;padding:.5rem .9rem;border-radius:12px;font-size:.75rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:.35rem;transition:transform .15s;}
        .btn-support-video:active{transform:scale(.95);}
        .btn-panic{background:var(--red);color:#fff;border:none;padding:.6rem 1rem;border-radius:12px;font-size:.75rem;font-weight:900;cursor:pointer;box-shadow:0 4px 12px rgba(239,68,68,.35);transition:transform .15s;}
        .btn-panic:active{transform:scale(.95);}

        /* NOMBRE MODAL */
        .name-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:2rem;}
        .name-modal-box{background:var(--bg-card);border-radius:24px;padding:2rem;width:100%;max-width:340px;text-align:center;}
        .name-modal-box h2{font-size:1.2rem;font-weight:800;margin-bottom:.5rem;}
        .name-modal-box p{font-size:.85rem;color:var(--text-muted);margin-bottom:1.2rem;}
        .name-modal-box input{width:100%;background:var(--bg-body);border:1px solid var(--border-color);padding:.85rem 1.1rem;border-radius:14px;color:var(--text-main);outline:none;font-size:.95rem;margin-bottom:1rem;}
        .name-modal-box input:focus{border-color:var(--purple-accent);}
        .btn-join{width:100%;background:var(--purple-accent);color:#fff;border:none;padding:.95rem;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .15s;}
        .btn-join:active{transform:scale(.98);}

        .chat-messages{flex:1;padding:1.2rem;overflow-y:auto;display:flex;flex-direction:column;gap:.75rem;}

        .msg-wrap{display:flex;flex-direction:column;max-width:78%;}
        .msg-wrap.mine{align-self:flex-end;align-items:flex-end;}
        .msg-wrap.theirs{align-self:flex-start;align-items:flex-start;}
        .msg-sender{font-size:.68rem;font-weight:700;color:var(--text-muted);margin-bottom:.2rem;padding:0 .5rem;}
        .msg{padding:.85rem 1.05rem;border-radius:20px;font-size:.92rem;line-height:1.45;word-break:break-word;}
        .msg.mine{background:var(--purple-accent);color:#fff;border-bottom-right-radius:4px;}
        .msg.theirs{background:var(--bg-card);color:var(--text-main);border-bottom-left-radius:4px;border:1px solid var(--border-color);}
        .msg-time{font-size:.63rem;opacity:.5;margin-top:.25rem;padding:0 .5rem;}
        .typing-wrap{align-self:flex-start;display:none;align-items:center;gap:.5rem;padding:.5rem 0;}
        .typing-wrap.show{display:flex;}
        .typing-bubble{background:var(--bg-card);border:1px solid var(--border-color);border-radius:20px;border-bottom-left-radius:4px;padding:.75rem 1rem;display:flex;gap:4px;align-items:center;}
        .typing-name{font-size:.72rem;color:var(--text-muted);}
        .dot{width:7px;height:7px;background:var(--text-muted);border-radius:50%;animation:bounce 1.2s infinite;}
        .dot:nth-child(2){animation-delay:.2s;}
        .dot:nth-child(3){animation-delay:.4s;}
        @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
        .msg-system{align-self:center;font-size:.75rem;color:var(--text-muted);background:var(--bg-body);border:1px solid var(--border-color);padding:.35rem .9rem;border-radius:20px;}

        .chat-input-area{padding:.9rem 1.2rem calc(.9rem + var(--safe-bottom));background:var(--bg-card);border-top:1px solid var(--border-color);display:flex;gap:.7rem;align-items:center;}
        .chat-input-area input{flex:1;background:var(--bg-body);border:1px solid var(--border-color);padding:.85rem 1.1rem;border-radius:22px;color:var(--text-main);outline:none;font-size:.92rem;transition:border-color .2s;}
        .chat-input-area input:focus{border-color:var(--purple-accent);}
        .btn-send{background:var(--purple-accent);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;}
        .btn-send:active{transform:scale(.9);}

        /* ═══════════════════════════════
           NOTIFICACIÓN CAMUFLADA (OS-style)
        ═══════════════════════════════ */
        .promo-notif{
            position:fixed;top:calc(var(--safe-top) + 12px);left:50%;
            transform:translateX(-50%) translateY(-120px);
            width:calc(100% - 2rem);max-width:380px;
            background:rgba(30,30,35,.92);
            backdrop-filter:blur(20px) saturate(1.6);
            -webkit-backdrop-filter:blur(20px) saturate(1.6);
            border:1px solid rgba(255,255,255,.08);
            border-radius:18px;padding:.75rem 1rem;
            display:flex;align-items:center;gap:.8rem;
            z-index:9999;
            transition:transform .45s cubic-bezier(.22,.68,0,1.2);
            pointer-events:none;
        }
        .promo-notif.show{transform:translateX(-50%) translateY(0);}
        .promo-notif-icon{
            width:40px;height:40px;border-radius:10px;
            background:linear-gradient(135deg,#8b5cf6,#3b82f6);
            display:flex;align-items:center;justify-content:center;
            font-size:1.2rem;flex-shrink:0;
        }
        .promo-notif-body{flex:1;min-width:0;}
        .promo-notif-app{font-size:.65rem;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.1rem;}
        .promo-notif-title{font-size:.85rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .promo-notif-sub{font-size:.72rem;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .promo-notif-time{font-size:.62rem;color:rgba(255,255,255,.4);flex-shrink:0;}

        /* ═══════════════════════════════
           LLAMADA MODAL
        ═══════════════════════════════ */
        .call-overlay{
            position:fixed;inset:0;background:rgba(0,0,0,.85);
            z-index:5000;display:none;flex-direction:column;
            align-items:center;justify-content:center;gap:1.5rem;
            padding:2rem;
        }
        .call-overlay.active{display:flex;}
        .call-avatar{
            width:90px;height:90px;border-radius:50%;
            background:linear-gradient(135deg,var(--purple-accent),#3b82f6);
            display:flex;align-items:center;justify-content:center;
            font-size:2.2rem;
            box-shadow:0 0 0 12px rgba(139,92,246,.2),0 0 0 24px rgba(139,92,246,.08);
            animation:callPulse 2s infinite;
        }
        @keyframes callPulse{0%,100%{box-shadow:0 0 0 12px rgba(139,92,246,.2),0 0 0 24px rgba(139,92,246,.08)}50%{box-shadow:0 0 0 18px rgba(139,92,246,.15),0 0 0 36px rgba(139,92,246,.04)}}
        .call-name{color:#fff;font-size:1.4rem;font-weight:800;}
        .call-status{color:rgba(255,255,255,.55);font-size:.9rem;}
        /* Video containers */
        .call-video-wrap{width:100%;max-width:360px;position:relative;display:none;border-radius:20px;overflow:hidden;background:#000;}
        .call-video-wrap.active{display:block;}
        #remoteVideo{width:100%;border-radius:20px;background:#111;display:block;min-height:200px;}
        #localVideo{position:absolute;bottom:.75rem;right:.75rem;width:90px;border-radius:10px;border:2px solid rgba(255,255,255,.3);}
        /* Botones llamada */
        .call-controls{display:flex;gap:1.2rem;align-items:center;}
        .call-ctrl-btn{
            width:58px;height:58px;border-radius:50%;border:none;
            display:flex;align-items:center;justify-content:center;
            font-size:1.3rem;cursor:pointer;transition:transform .15s;
        }
        .call-ctrl-btn:active{transform:scale(.9);}
        .btn-mute{background:rgba(255,255,255,.12);color:#fff;}
        .btn-cam{background:rgba(255,255,255,.12);color:#fff;}
        .btn-hang{background:#ef4444;color:#fff;width:68px;height:68px;}
        .btn-spk{background:rgba(255,255,255,.12);color:#fff;}
    </style>
</head>
<body>

<!-- ══════════════ TIENDA ══════════════ -->
<div id="vista-tienda" style="display:flex;flex-direction:column;min-height:100vh;">
    <header>
        <div class="logo">VibeStore ✦</div>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" aria-label="Cambiar tema">🌙</button>
            <button class="icon-btn cart-btn" onclick="openCart()" aria-label="Ver carrito">
                🛍️<span class="badge" id="cartBadge">0</span>
            </button>
        </div>
    </header>
    <nav class="nav-scroller">
        <button class="btn-cat active" onclick="filterCat('all',this)">⚡ Todo</button>
        <button class="btn-cat" onclick="filterCat('maquillaje',this)">💄 Maquillaje</button>
        <button class="btn-cat" onclick="filterCat('tecnologia',this)">🔌 Tecnología</button>
        <button class="btn-cat" onclick="filterCat('hogar',this)">🏠 Hogar</button>
        <button class="btn-cat" onclick="filterCat('deportes',this)">⚽ Deportes</button>
    </nav>
    <main class="main-content">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="search" id="searchBox" class="search-input" placeholder="Buscar productos…" oninput="filterSearch(this)" autocomplete="off">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
        </div>
        <div class="grid-productos" id="productGrid"></div>
    </main>
    <div class="footer-checkout">
        <div class="footer-inner">
            <button class="btn-view-cart" onclick="openCart()">🛍️ Carrito <span id="footerCount">(0)</span></button>
            <button class="btn-checkout" onclick="handleCheckout()">Pagar →</button>
        </div>
    </div>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
    <div class="drawer-handle"></div>
    <h2 class="drawer-title">Tu carrito</h2>
    <div id="cartItems"></div>
    <div class="cart-total-row">
        <span class="cart-total-label">Total estimado</span>
        <span class="cart-total-value" id="cartTotal">$0.00</span>
    </div>
    <button class="btn-pay" onclick="closeCart();handleCheckout();">Proceder al Pago</button>
</div>
<div class="toast" id="toast"></div>

<!-- ══════════════ NOTIFICACIÓN CAMUFLADA ══════════════ -->
<div class="promo-notif" id="promoNotif">
    <div class="promo-notif-icon" id="promoNotifIcon">🛍️</div>
    <div class="promo-notif-body">
        <div class="promo-notif-app" id="promoNotifApp">VibeStore</div>
        <div class="promo-notif-title" id="promoNotifTitle">¡Oferta relámpago activa!</div>
        <div class="promo-notif-sub" id="promoNotifSub">Descuentos hasta 50% en seleccionados</div>
    </div>
    <div class="promo-notif-time" id="promoNotifTime">ahora</div>
</div>

function escHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderStore(){
    const grid  = document.getElementById('productGrid');
    const query = document.getElementById('searchBox').value.toLowerCase().trim();
    const list  = products.filter(p=>
        (curCat==='all'||p.cat===curCat)&&
        (p.name.toLowerCase().includes(query)||p.desc.toLowerCase().includes(query))
    );
    if(!list.length){
        grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><p>Sin resultados</p><small>Prueba otra categoría.</small></div>`;
        return;
    }
    grid.innerHTML=list.map(p=>`
        <div class="card">
            <span class="card-tag">${CAT_META[p.cat].emoji} ${p.cat}</span>
            <div class="img-container">
                ${CAT_META[p.cat].emoji}
                <img src="${p.img}" alt="${escHtml(p.name)}" loading="lazy" onerror="this.style.display='none'">
            </div>
            <div>
                <h3 class="card-title" title="${escHtml(p.name)}">${escHtml(p.name)}</h3>
                <p class="card-desc">${escHtml(p.desc)}</p>
            </div>
            <div class="card-footer">
                <span class="price">$${p.price.toFixed(2)}</span>
                <button class="btn-add" id="btn-${p.id}" onclick="addToCart('${p.cat}',${p.id},this)">+</button>
            </div>
        </div>`).join('');
}

window.addToCart = function(cat,id,btn){
    cart[cat]=(cart[cat]||0)+1;
    updateCartUI();
    btn.classList.add('added');
    setTimeout(()=>btn.classList.remove('added'),400);
    const p=products.find(x=>x.id===id);
    showToast(`${p.name} añadido 🛍️`);
};

function updateCartUI(){
    const total=Object.values(cart).reduce((a,b)=>a+b,0);
    const badge=document.getElementById('cartBadge');
    badge.textContent=total;
    badge.classList.remove('pop');
    void badge.offsetWidth;
    badge.classList.add('pop');
    document.getElementById('footerCount').textContent=`(${total})`;
}

window.openCart=function(){
    const cats=Object.keys(cart).filter(k=>cart[k]>0);
    const itemsEl=document.getElementById('cartItems');
    if(!cats.length){
        itemsEl.innerHTML=`<p class="cart-empty-msg">Tu carrito está vacío 🛍️</p>`;
    } else {
        const prices={maquillaje:22,tecnologia:65,hogar:27,deportes:19};
        itemsEl.innerHTML=cats.map(k=>`
            <div class="cart-item-row">
                <span class="cat-name">${CAT_META[k].emoji} ${k}</span>
                <div class="cat-qty">
                    <button class="qty-btn" onclick="changeQty('${k}',-1)">−</button>
                    <span class="qty-num">${cart[k]}</span>
                    <button class="qty-btn" onclick="changeQty('${k}',1)">+</button>
                </div>
            </div>`).join('');
        const prices2={maquillaje:22,tecnologia:65,hogar:27,deportes:19};
        const total=cats.reduce((s,k)=>s+cart[k]*prices2[k],0);
        document.getElementById('cartTotal').textContent=`$${total.toFixed(2)}`;
    }
    document.getElementById('cartDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
};

window.closeCart=function(){
    document.getElementById('cartDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
};

window.changeQty=function(cat,delta){
    cart[cat]=Math.max(0,(cart[cat]||0)+delta);

window.openChat = function(){
    document.getElementById('seccion-chat').style.display='flex';
};
window.closeChat = function(){
    document.getElementById('seccion-chat').style.display='none';
};

window.joinChat = function(){
    const inp = document.getElementById('nameInput');
    const name = inp.value.trim();
    if(!name){ inp.focus(); return; }
    myName = name;
    document.getElementById('nameModal').style.display='none';

    // Presencia
    set(presenceRef,{name:myName,online:true,ts:serverTimestamp()});
    onDisconnect(presenceRef).remove();

    // Listeners
    listenPresence();
    listenMessages();
    listenTyping();

    // Mensaje de entrada
    push(messagesRef,{
        type:'system', text:`${myName} se unió al canal`,
        ts:serverTimestamp()
    });
};

function listenPresence(){
    const presRef = ref(db,'chat/presence');
    onValue(presRef, snap=>{
        const data = snap.val()||{};
        const count = Object.keys(data).length;
        document.getElementById('onlineStatus').textContent=
            count===1?'Solo tú online':`${count} personas online`;
    });
}

function listenMessages(){
    onValue(messagesRef, snap=>{
        const data=snap.val()||{};
        const workspace=document.getElementById('chatWorkspace');
        const typingEl=document.getElementById('typingWrap');

        Object.entries(data).forEach(([key,msg])=>{
            if(seenKeys.has(key)) return;
            seenKeys.add(key);

            let el;
            if(msg.type==='system'){
                el=document.createElement('div');
                el.className='msg-system';
                el.textContent=msg.text||'';
            } else {
                const isMine = msg.senderId===myId;
                const wrap=document.createElement('div');
                wrap.className='msg-wrap '+(isMine?'mine':'theirs');
                const time=msg.ts?new Date(msg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
                wrap.innerHTML=`
                    ${!isMine?`<div class="msg-sender">${escHtml(msg.sender||'?')}</div>`:''}
                    <div class="msg ${isMine?'mine':'theirs'}">${escHtml(msg.text||'')}</div>
                    <div class="msg-time">${time}</div>`;
                el=wrap;
            }
            workspace.insertBefore(el, typingEl);
        });
        workspace.scrollTop=workspace.scrollHeight;
    });
}

function listenTyping(){
    const typRef=ref(db,'chat/typing');
    onValue(typRef, snap=>{
        const data=snap.val()||{};
        const others=Object.entries(data)
            .filter(([id,v])=>id!==myId&&v&&v.name)
            .map(([,v])=>v.name);
        const wrap=document.getElementById('typingWrap');
        const nameEl=document.getElementById('typingName');
        if(others.length){
            nameEl.textContent=others[0];
            wrap.classList.add('show');
            /* Notificación camuflada */
            showTypingNotif(others[0]);
        } else {
            wrap.classList.remove('show');
        }
        document.getElementById('chatWorkspace').scrollTop=
            document.getElementById('chatWorkspace').scrollHeight;
    });
}

window.handleTyping = function(){
    set(typingRef,{name:myName,ts:serverTimestamp()});
    clearTimeout(typingTimer);
    typingTimer=setTimeout(()=>remove(typingRef),2500);
};

window.handleChatKey = function(e){
    if(e.key==='Enter') sendMsg();
};

window.sendMsg = function(){
    const inp=document.getElementById('chatInput');
    const text=inp.value.trim();
    if(!text||!myName) return;
    inp.value='';
    remove(typingRef);

    push(messagesRef,{
        text, sender:myName, senderId:myId,
        ts:serverTimestamp()
    }).then(r=>{
        // Guardar key para poder borrar al pánico
        myMsgKeys.push(r.key);
    });
};

/* ═══════════════════════════════
   PÁNICO — borra mis mensajes + regresa
═══════════════════════════════ */
window.panicExit = async function(){
    // Borrar typing
    remove(typingRef);
    remove(presenceRef);

    // Borrar todos mis mensajes de Firebase
    const snap = await get(messagesRef);
    if(snap.exists()){
        snap.forEach(child=>{
            const msg=child.val();
            if(msg.senderId===myId){
                remove(ref(db,'chat/messages/'+child.key));
            }
        });
    }

    // Cerrar escuchas
    off(messagesRef);
    off(ref(db,'chat/typing'));
    off(ref(db,'chat/presence'));

    // Resetear estado local
    seenKeys.clear();
    myMsgKeys=[];
    myName='';
    document.getElementById('nameInput').value='';
    document.getElementById('chatWorkspace').innerHTML=`
        <div class="typing-wrap" id="typingWrap">
            <span class="typing-name" id="typingName"></span>
            <div class="typing-bubble">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>`;
    document.getElementById('nameModal').style.display='flex';

    // Salir al chat → redirigir a tienda
    closeChat();

    // Mostrar notif camuflada inocente
    showPromoNotif('¡Descuento especial para ti!','Usa el código VIBE20 antes de medianoche','🏷️','VibeStore Ofertas');
};

/* ═══════════════════════════════
   LLAMADAS WebRTC + Firebase Signaling
═══════════════════════════════ */
let localStream   = null;
let remoteStream  = null;
let peerConn      = null;
let callType      = 'voice';   // 'voice' | 'video'
let callRoomId    = null;
let isMuted       = false;
let isCamOff      = false;

const ICE_SERVERS = {iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
]};

window.startCall = async function(type){
    callType = type;
    callRoomId = myId + '_' + Date.now();

    const constraints = {
        audio:true,
        video: type==='video' ? {facingMode:'user'} : false
    };

    try {
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(e){
        showPromoNotif('Permiso requerido','Activa micrófono/cámara en ajustes','⚙️','Sistema');
        return;
    }

    if(type==='video'){
        document.getElementById('localVideo').srcObject  = localStream;
        document.getElementById('callVideoWrap').classList.add('active');
        document.getElementById('callAvatar').style.display='none';
        document.getElementById('btnCam').style.display='flex';
    } else {
        document.getElementById('callVideoWrap').classList.remove('active');
        document.getElementById('callAvatar').style.display='flex';
        document.getElementById('callAvatar').textContent='📞';
        document.getElementById('btnCam').style.display='none';
    }

    document.getElementById('callPeerName').textContent = 'Soporte VibeStore';
    document.getElementById('callStatus').textContent   = 'Esperando conexión…';
    document.getElementById('callOverlay').classList.add('active');

    // Crear PeerConnection
    peerConn = new RTCPeerConnection(ICE_SERVERS);

    localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));

    remoteStream = new MediaStream();
    peerConn.ontrack = e=>{
        e.streams[0].getTracks().forEach(t=>remoteStream.addTrack(t));
        if(type==='video'){
            document.getElementById('remoteVideo').srcObject = remoteStream;
        }
        document.getElementById('callStatus').textContent='Conectado ✓';
    };

    // Señalización vía Firebase
    const roomRef = ref(db,'calls/'+callRoomId);

    peerConn.onicecandidate = e=>{
        if(e.candidate){
            push(ref(db,'calls/'+callRoomId+'/callerCandidates'),
                e.candidate.toJSON());
        }
    };

    // Crear oferta
    const offer = await peerConn.createOffer();
    await peerConn.setLocalDescription(offer);
    await set(roomRef,{offer:{type:offer.type,sdp:offer.sdp},callType:type});

    // Escuchar respuesta
    onValue(roomRef, async snap=>{
        const data=snap.val();
        if(!data) return;
        if(data.answer && peerConn.currentRemoteDescription===null){
            await peerConn.setRemoteDescription(
                new RTCSessionDescription(data.answer));
            document.getElementById('callStatus').textContent='Conectado ✓';
        }
    });

    // Escuchar candidatos del otro extremo
    onValue(ref(db,'calls/'+callRoomId+'/calleeCandidates'), snap=>{
        snap.forEach(c=>{
            peerConn.addIceCandidate(new RTCIceCandidate(c.val()));
        });
    });

    // Notif camuflada
    showPromoNotif(
        type==='video'?'Soporte video iniciado':'Soporte por voz iniciado',
        'Un agente VibeStore se está conectando',
        type==='video'?'📹':'📞',
        'VibeStore Soporte'
    );
};

window.endCall = function(){
    if(peerConn){ peerConn.close(); peerConn=null; }
    if(localStream) localStream.getTracks().forEach(t=>t.stop());
    if(callRoomId) remove(ref(db,'calls/'+callRoomId));
    document.getElementById('callOverlay').classList.remove('active');
    document.getElementById('remoteVideo').srcObject=null;
    document.getElementById('localVideo').srcObject=null;
    document.getElementById('callVideoWrap').classList.remove('active');
    document.getElementById('callAvatar').style.display='flex';
    showPromoNotif('Soporte finalizado','Gracias por contactarnos 👋','✅','VibeStore Soporte');
};

window.toggleMute = function(){
    if(!localStream) return;
    isMuted=!isMuted;
    localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
    document.getElementById('btnMute').textContent=isMuted?'🔇':'🎤';
};

window.toggleCamera = function(){
    if(!localStream) return;
    isCamOff=!isCamOff;
    localStream.getVideoTracks().forEach(t=>t.enabled=!isCamOff);
    document.getElementById('btnCam').textContent=isCamOff?'🚫':'📷';
};

window.toggleSpeaker = function(){
    const vid=document.getElementById('remoteVideo');
    vid.muted=!vid.muted;
    document.getElementById('btnSpk').textContent=vid.muted?'🔇':'🔈';
};
